name: Build and Deploy VFX Lab

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './vfx/package.json'

      - name: Install Dependencies 📦
        run: |
          cd vfx
          npm install

      - name: Install Chrome for Puppeteer 🌐
        run: |
          cd vfx
          npx puppeteer browsers install chrome

      - name: Generate Build 🔨
        run: |
          cd vfx
          npm run build
        env:
          CI: true

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./vfx
          publish_branch: gh-pages
          force_orphan: true # Keep the gh-pages branch clean/compact
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "chore: deploy vfx lab [skip ci]"
