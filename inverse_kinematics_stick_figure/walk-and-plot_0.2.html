<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walk & Plot Studio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #e5e5e5;
            overflow: hidden;
            touch-action: none;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar for Timeline */
        .timeline-scroll::-webkit-scrollbar {
            height: 8px;
        }
        .timeline-scroll::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-radius: 4px;
        }
        .timeline-scroll::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        .timeline-scroll::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* Canvas with Dark Gradient for Glowing Effects */
        #anim-canvas {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            cursor: crosshair;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body class="h-screen flex flex-col antialiased select-none">

    <!-- Top Toolbar -->
    <header class="h-16 bg-neutral-900 border-b border-neutral-800 flex items-center justify-between px-4 shrink-0 shadow-md z-10">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-600/30">
                <i data-lucide="footprints" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-lg font-bold tracking-wide text-white hidden md:block">Walk & Plot Studio</h1>
        </div>

        <!-- Coordinates Input Form -->
        <div class="flex items-center space-x-2 sm:space-x-4">
            <form id="plot-form" class="flex items-center space-x-2 bg-neutral-800 p-1.5 rounded-lg border border-neutral-700 shadow-inner">
                <div class="flex items-center space-x-1 px-1">
                    <span class="text-xs font-bold text-neutral-500 mono">X:</span>
                    <input type="number" id="input-x" required step="any" placeholder="0" class="w-14 sm:w-20 bg-neutral-900 border border-neutral-600 rounded p-1.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono text-center transition">
                </div>
                <div class="flex items-center space-x-1 px-1">
                    <span class="text-xs font-bold text-neutral-500 mono">Y:</span>
                    <input type="number" id="input-y" required step="any" placeholder="0" class="w-14 sm:w-20 bg-neutral-900 border border-neutral-600 rounded p-1.5 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono text-center transition">
                </div>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-md text-sm font-bold transition flex items-center shadow">
                    <i data-lucide="pencil" class="w-4 h-4 sm:mr-2"></i>
                    <span class="hidden sm:inline">Draw Point</span>
                </button>
            </form>

            <button type="button" onclick="plotRandom()" class="flex items-center space-x-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 px-3 py-2 rounded-lg text-sm font-medium transition" title="Random Point">
                <i data-lucide="dices" class="w-4 h-4 text-indigo-400"></i>
                <span class="hidden sm:inline">Random</span>
            </button>
        </div>

        <div class="flex items-center">
            <button onclick="clearGraph()" class="p-2 bg-neutral-800 hover:bg-red-900/50 hover:text-red-400 hover:border-red-800 border border-neutral-700 rounded-lg text-neutral-400 transition flex items-center" title="Clear Canvas">
                <i data-lucide="trash-2" class="w-4 h-4 sm:mr-1"></i>
                <span class="hidden sm:inline text-xs font-bold">CLEAR</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 bg-neutral-950 relative">
        <!-- Canvas Container -->
        <div class="relative w-full h-full flex items-center justify-center">
            <canvas id="anim-canvas" class="touch-none"></canvas>
            
            <!-- Instructions Overlay -->
            <div id="instruction-overlay" class="absolute bottom-6 left-6 bg-black/60 backdrop-blur text-xs font-medium text-neutral-300 px-4 py-3 rounded-lg pointer-events-none transition-opacity duration-500 border border-neutral-800 shadow-xl">
                <p class="mb-1"><strong class="text-indigo-400">Click anywhere</strong> on the grid to plot a point.</p>
                <p>Or use the <strong class="text-indigo-400">top toolbar</strong> for exact coordinates.</p>
            </div>

            <!-- Axis Labels -->
            <div class="absolute top-4 left-4 text-[10px] font-bold text-slate-400 tracking-widest mono bg-slate-900/80 px-2 py-1 rounded border border-slate-700 pointer-events-none">Y-AXIS</div>
            <div class="absolute bottom-4 right-4 text-[10px] font-bold text-slate-400 tracking-widest mono bg-slate-900/80 px-2 py-1 rounded border border-slate-700 pointer-events-none">X-AXIS</div>
        </div>
    </main>

    <!-- Bottom Timeline -->
    <footer class="h-28 bg-neutral-900 border-t border-neutral-800 flex flex-col shrink-0">
        <div class="px-4 py-1.5 flex justify-between items-center bg-neutral-950 border-b border-neutral-800 text-xs text-neutral-500 font-bold tracking-wider uppercase">
            <span>Point Timeline (Queue & History)</span>
            <span id="point-counter" class="text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded">0 Points</span>
        </div>
        <div id="timeline" class="flex-1 flex items-center px-4 space-x-3 overflow-x-auto timeline-scroll py-2">
            <!-- Point cards injected here by JS -->
            <div class="text-neutral-600 text-xs italic font-medium w-full text-center" id="empty-timeline">No points plotted yet.</div>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // --- Core Variables & Setup ---
        const canvas = document.getElementById('anim-canvas');
        const ctx = canvas.getContext('2d');
        const instructionOverlay = document.getElementById('instruction-overlay');
        const timelineEl = document.getElementById('timeline');

        let cw, ch;
        let originX, originY;
        const scale = 40; // Pixels per logical unit
        
        let allPoints = []; // Array of { id, lx, ly, px, py, status: 'QUEUED' | 'ACTIVE' | 'DONE' }
        let pointIdCounter = 0;
        let particles = [];

        function resize() {
            // Get actual dimensions of the parent container to fill it
            const rect = canvas.parentElement.getBoundingClientRect();
            cw = rect.width;
            ch = rect.height;
            canvas.width = cw;
            canvas.height = ch;
            originX = Math.floor(cw / 2);
            originY = Math.floor(ch / 2);
        }
        window.addEventListener('resize', resize);
        resize();

        const toPx = (lx, ly) => ({ x: originX + lx * scale, y: originY - ly * scale });
        const toLogical = (px, py) => ({ lx: (px - originX) / scale, ly: (originY - py) / scale });

        // --- Walking Stickman Character ---
        const char = {
            x: originX,
            y: originY,
            targetX: originX,
            targetY: originY,
            facing: 1, // 1 for right, -1 for left
            state: 'IDLE', // IDLE, WALKING, PLOTTING
            walkCycle: 0,
            activePoint: null, 
            timer: 0
        };

        // --- Math / Drawing Helpers ---
        function drawGrid() {
            ctx.lineWidth = 1;
            
            // Faint grid lines
            ctx.strokeStyle = 'rgba(51, 65, 85, 0.4)'; 
            ctx.beginPath();
            for (let x = originX % scale; x < cw; x += scale) {
                ctx.moveTo(x, 0); ctx.lineTo(x, ch);
            }
            for (let y = originY % scale; y < ch; y += scale) {
                ctx.moveTo(0, y); ctx.lineTo(cw, y);
            }
            ctx.stroke();

            // Thick Axes
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.7)'; 
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, originY); ctx.lineTo(cw, originY); // X Axis
            ctx.moveTo(originX, 0); ctx.lineTo(originX, ch); // Y Axis
            ctx.stroke();

            // Tick Marks and Numbers
            ctx.fillStyle = '#64748b'; 
            ctx.font = '10px "JetBrains Mono", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let i = -50; i <= 50; i++) {
                if (i === 0) continue;
                let px = originX + i * scale;
                if (px > 0 && px < cw) {
                    ctx.beginPath(); ctx.moveTo(px, originY - 4); ctx.lineTo(px, originY + 4); ctx.stroke();
                    if(i % 2 === 0) ctx.fillText(i, px, originY + 14);
                }
                let py = originY - i * scale;
                if (py > 0 && py < ch) {
                    ctx.beginPath(); ctx.moveTo(originX - 4, py); ctx.lineTo(originX + 4, py); ctx.stroke();
                    if(i % 2 === 0) {
                        ctx.textAlign = 'right';
                        ctx.fillText(i, originX - 8, py);
                        ctx.textAlign = 'center';
                    }
                }
            }
        }

        function drawStickman() {
            ctx.save();
            ctx.translate(char.x, char.y);
            ctx.scale(char.facing, 1);

            ctx.lineWidth = 4;
            ctx.strokeStyle = '#ffffff';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Bobbing effect during walk
            let bob = 0;
            if (char.state === 'WALKING') {
                bob = Math.abs(Math.sin(char.walkCycle * 2)) * 3;
            }
            ctx.translate(0, -bob);

            // Head
            ctx.beginPath();
            ctx.arc(0, -35, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#0f172a';
            ctx.fill(); ctx.stroke();

            // Cute Eyes
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(4, -37, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(9, -37, 2, 0, Math.PI * 2); ctx.fill();
            
            // Smile
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(6, -33, 4, 0, Math.PI * 0.8); ctx.stroke();

            // Torso
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, -23);
            ctx.lineTo(0, 10);
            ctx.stroke();

            // Legs Animation Logic
            let leg1X = 0, leg1Y = 35, knee1X = 0, knee1Y = 20;
            let leg2X = 0, leg2Y = 35, knee2X = 0, knee2Y = 20;

            if (char.state === 'WALKING') {
                const stride = 16;
                const lift = 10;
                
                leg1X = Math.sin(char.walkCycle) * stride;
                leg1Y = 35 - Math.max(0, Math.cos(char.walkCycle)) * lift;
                knee1X = leg1X / 2 + Math.sin(char.walkCycle - Math.PI/4) * 6;
                knee1Y = 10 + (leg1Y - 10) / 2;

                leg2X = Math.sin(char.walkCycle + Math.PI) * stride;
                leg2Y = 35 - Math.max(0, Math.cos(char.walkCycle + Math.PI)) * lift;
                knee2X = leg2X / 2 + Math.sin(char.walkCycle + Math.PI - Math.PI/4) * 6;
                knee2Y = 10 + (leg2Y - 10) / 2;
            } else {
                leg1X = -6; leg2X = 6;
                knee1X = -3; knee2X = 3;
            }

            ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(knee1X, knee1Y); ctx.lineTo(leg1X, leg1Y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(knee2X, knee2Y); ctx.lineTo(leg2X, leg2Y); ctx.stroke();

            // Arms Animation Logic
            let arm1X = -8, arm1Y = 5; 
            let arm2X = 8, arm2Y = 5;  

            if (char.state === 'WALKING') {
                arm1X = Math.sin(char.walkCycle + Math.PI) * 12;
                arm2X = Math.sin(char.walkCycle) * 12;
            }

            // Back Arm
            ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(arm1X, arm1Y); ctx.stroke();

            // Front Arm (Drawing Arm)
            ctx.beginPath(); ctx.moveTo(0, -15);
            
            if (char.state === 'PLOTTING' && char.activePoint) {
                let localTx = (char.activePoint.px - char.x) * char.facing;
                let localTy = (char.activePoint.py - char.y) + bob + 15; 
                
                let handX = localTx;
                let handY = localTy;
                
                // Draw circle animation
                if (char.timer > 10 && char.timer < 45) {
                    const progress = (char.timer - 10) / 35;
                    handX += Math.cos(progress * Math.PI * 2) * 8;
                    handY += Math.sin(progress * Math.PI * 2) * 8;
                    
                    ctx.beginPath();
                    ctx.arc(localTx, localTy, 8, 0, progress * Math.PI * 2);
                    ctx.strokeStyle = '#6366f1'; 
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Emit chalk dust
                    if (Math.random() > 0.3) {
                        const globalHx = char.x + handX * char.facing;
                        const globalHy = char.y - bob - 15 + handY;
                        particles.push({
                            x: globalHx, y: globalHy, 
                            vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, 
                            life: 1, size: Math.random()*3+1
                        });
                    }
                }
                
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.lineTo(handX, handY);
                ctx.stroke();
                
                // Chalk Piece
                ctx.beginPath();
                ctx.moveTo(handX, handY);
                ctx.lineTo(handX + 4, handY - 4);
                ctx.strokeStyle = '#818cf8'; 
                ctx.lineWidth = 3;
                ctx.stroke();
                
            } else {
                ctx.lineTo(arm2X, arm2Y);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawParticles() {
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.04;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    return;
                }
                
                ctx.fillStyle = `rgba(99, 102, 241, ${p.life})`; 
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawPlottedPoints() {
            allPoints.filter(p => p.status === 'DONE').forEach(p => {
                const px = p.px;
                const py = p.py;
                
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#6366f1';
                
                ctx.strokeStyle = '#818cf8';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2); ctx.stroke();
                
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2); ctx.fill();
                
                ctx.shadowBlur = 0; 

                ctx.fillStyle = '#94a3b8'; 
                ctx.font = '11px "JetBrains Mono", monospace';
                ctx.textAlign = 'left';
                ctx.fillText(`(${p.lx.toFixed(1)}, ${p.ly.toFixed(1)})`, px + 12, py - 12);
            });
        }

        // --- Engine Loop ---
        function update() {
            if (char.state === 'IDLE') {
                const nextPoint = allPoints.find(p => p.status === 'QUEUED');
                if (nextPoint) {
                    char.activePoint = nextPoint;
                    char.activePoint.status = 'ACTIVE';
                    char.state = 'WALKING';
                    updateTimelineUI(); // Refresh UI to show Active state
                    
                    let offsetX = -30; 
                    if (char.activePoint.px < 50) offsetX = 30; 
                    
                    char.targetX = char.activePoint.px + offsetX;
                    char.targetY = char.activePoint.py + 25; 
                    char.facing = offsetX < 0 ? 1 : -1;
                }
            }

            if (char.state === 'WALKING') {
                let dx = char.targetX - char.x;
                let dy = char.targetY - char.y;
                let dist = Math.hypot(dx, dy);

                if (dist > 2) {
                    char.x += (dx / dist) * 4; 
                    char.y += (dy / dist) * 4;
                    char.walkCycle += 0.25; 
                    
                    if (dist > 10) {
                        char.facing = dx > 0 ? 1 : -1;
                    }
                } else {
                    char.x = char.targetX;
                    char.y = char.targetY;
                    char.state = 'PLOTTING';
                    char.timer = 0;
                    char.walkCycle = 0; 
                    char.facing = (char.activePoint.px > char.x) ? 1 : -1; 
                }
            }

            if (char.state === 'PLOTTING') {
                char.timer++;
                
                if (char.timer === 45) {
                    char.activePoint.status = 'DONE';
                    updateTimelineUI();
                }

                if (char.timer > 70) {
                    char.state = 'IDLE';
                    char.activePoint = null;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, cw, ch);
            drawGrid();
            drawPlottedPoints();
            drawParticles();
            drawStickman();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // --- Interactivity & UI ---
        function queuePoint(lx, ly) {
            instructionOverlay.style.opacity = '0'; // Hide instructions
            
            const pxCoords = toPx(lx, ly);
            const newPoint = { 
                id: pointIdCounter++, 
                lx: lx, 
                ly: ly, 
                px: pxCoords.x, 
                py: pxCoords.y,
                status: 'QUEUED'
            };
            allPoints.push(newPoint);
            updateTimelineUI();
        }

        document.getElementById('plot-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const x = parseFloat(document.getElementById('input-x').value);
            const y = parseFloat(document.getElementById('input-y').value);
            if(!isNaN(x) && !isNaN(y)) {
                queuePoint(x, y);
                document.getElementById('input-x').value = '';
                document.getElementById('input-y').value = '';
                document.getElementById('input-x').focus();
            }
        });

        function plotRandom() {
            const x = parseFloat((Math.random() * 20 - 10).toFixed(1));
            const y = parseFloat((Math.random() * 14 - 7).toFixed(1));
            queuePoint(x, y);
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            const logical = toLogical(px, py);
            
            const lx = Math.round(logical.lx * 10) / 10;
            const ly = Math.round(logical.ly * 10) / 10;
            queuePoint(lx, ly);
        });

        function updateTimelineUI() {
            const emptyState = document.getElementById('empty-timeline');
            if (allPoints.length > 0 && emptyState) {
                emptyState.remove();
            }

            // Update Counter
            const doneCount = allPoints.filter(p => p.status === 'DONE').length;
            document.getElementById('point-counter').innerText = `${doneCount} / ${allPoints.length} Points`;

            timelineEl.innerHTML = '';
            
            allPoints.forEach((p, idx) => {
                const box = document.createElement('div');
                let bgClass, borderClass, textClass, iconHtml;

                if (p.status === 'DONE') {
                    bgClass = 'bg-neutral-800';
                    borderClass = 'border-neutral-700';
                    textClass = 'text-neutral-300';
                    iconHtml = '<i data-lucide="check-circle-2" class="w-3 h-3 text-emerald-500 mb-1"></i>';
                } else if (p.status === 'ACTIVE') {
                    bgClass = 'bg-indigo-900/40';
                    borderClass = 'border-indigo-500';
                    textClass = 'text-indigo-300';
                    iconHtml = '<i data-lucide="loader-2" class="w-3 h-3 text-indigo-400 mb-1 animate-spin"></i>';
                } else {
                    bgClass = 'bg-neutral-900';
                    borderClass = 'border-neutral-800 border-dashed';
                    textClass = 'text-neutral-500';
                    iconHtml = '<i data-lucide="clock" class="w-3 h-3 text-neutral-500 mb-1"></i>';
                }

                box.className = `h-16 w-20 shrink-0 rounded-lg border flex flex-col items-center justify-center font-mono transition-colors duration-300 ${bgClass} ${borderClass}`;
                box.id = `point-card-${p.id}`;
                
                box.innerHTML = `
                    ${iconHtml}
                    <span class="text-xs font-bold ${textClass}">(${p.lx}, ${p.ly})</span>
                `;
                
                timelineEl.appendChild(box);

                // Auto-scroll to active point
                if (p.status === 'ACTIVE') {
                    box.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
            
            lucide.createIcons();
        }

        function clearGraph() {
            allPoints = [];
            pointIdCounter = 0;
            char.state = 'IDLE';
            char.activePoint = null;
            
            // Return character to origin
            char.targetX = originX;
            char.targetY = originY;
            if(Math.hypot(char.targetX - char.x, char.targetY - char.y) > 5) {
                char.state = 'WALKING';
            }
            
            timelineEl.innerHTML = '<div class="text-neutral-600 text-xs italic font-medium w-full text-center" id="empty-timeline">No points plotted yet.</div>';
            document.getElementById('point-counter').innerText = '0 Points';
        }

        // Start engine
        requestAnimationFrame(loop);

    </script>
</body>
</html>
