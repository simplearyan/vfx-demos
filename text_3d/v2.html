<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Realistic Text Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            outline: none;
        }
        .glass-panel {
            background: rgba(15, 15, 15, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom inputs */
        input[type="text"], select {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            transition: all 0.2s;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.8);
        }
    </style>
    
    <!-- Import Map for Modern Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="text-white relative">

    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 z-50 bg-[#050505] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-bold tracking-widest uppercase text-white/80">Loading Engine</h2>
        <p class="text-sm text-gray-500 mt-2">Fetching 3D assets & environment...</p>
    </div>

    <!-- 3D Canvas -->
    <canvas id="webgl-canvas"></canvas>

    <!-- Header -->
    <div class="fixed top-6 left-6 pointer-events-none z-10">
        <h1 class="text-2xl font-bold tracking-tight text-white drop-shadow-md">Text<span class="text-gray-500 font-light">3D</span></h1>
        <p class="text-xs text-gray-400 font-medium tracking-wide mt-1 uppercase flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500 inline-block animate-pulse"></span>
            Performance Mode
        </p>
    </div>

    <!-- Controls Panel (Top Right) -->
    <div class="fixed top-6 right-6 z-10 w-72 glass-panel rounded-2xl p-5 flex flex-col gap-4">
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Your Text</label>
            <input type="text" id="textInput" value="IGNITE" class="w-full px-3 py-2 rounded-lg text-sm" placeholder="Type something..." maxlength="15">
        </div>
        
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Typography</label>
            <select id="fontSelect" class="w-full px-3 py-2 rounded-lg text-sm appearance-none cursor-pointer">
                <option value="helvetiker">Helvetiker (Bold)</option>
                <option value="optimer">Optimer (Bold)</option>
                <option value="gentilis">Gentilis (Regular)</option>
                <option value="droid">Droid Sans (Bold)</option>
            </select>
        </div>
        
        <p class="text-[10px] text-gray-500 text-center mt-2">Drag to rotate • Scroll to zoom</p>
    </div>

    <!-- Presets Dock (Bottom Center) -->
    <div class="fixed bottom-8 left-1/2 transform -translate-x-1/2 glass-panel rounded-2xl p-2 flex items-center gap-2 shadow-2xl z-10">
        
        <button data-preset="fire" class="preset-btn flex items-center gap-2 px-5 py-3 rounded-xl transition-all active:scale-95 bg-orange-500/20 text-orange-400 border border-orange-500/30">
            <i data-lucide="flame" class="w-5 h-5"></i>
            <span class="font-semibold text-sm tracking-wide">Fire</span>
        </button>
        
        <button data-preset="glass" class="preset-btn flex items-center gap-2 px-5 py-3 rounded-xl transition-all active:scale-95 hover:bg-white/10 text-gray-400 border border-transparent">
            <i data-lucide="droplet" class="w-5 h-5"></i>
            <span class="font-semibold text-sm tracking-wide">Glass</span>
        </button>
        
        <button data-preset="metal" class="preset-btn flex items-center gap-2 px-5 py-3 rounded-xl transition-all active:scale-95 hover:bg-white/10 text-gray-400 border border-transparent">
            <i data-lucide="box" class="w-5 h-5"></i>
            <span class="font-semibold text-sm tracking-wide">Metal</span>
        </button>

    </div>

    <!-- Application Logic -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        lucide.createIcons();

        // --- Configuration & State ---
        let scene, camera, renderer, controls, composer, bloomPass;
        let textMesh, currentFont;
        let fonts = {};
        
        const state = {
            text: 'IGNITE',
            fontName: 'helvetiker',
            preset: 'fire'
        };

        // Font URLs (from official Three.js CDN)
        const fontUrls = {
            helvetiker: 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json',
            optimer: 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/optimer_bold.typeface.json',
            gentilis: 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/gentilis_regular.typeface.json',
            droid: 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/droid/droid_sans_bold.typeface.json'
        };

        // --- Materials Presets ---
        const materials = {
            glass: new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                metalness: 0.1,
                roughness: 0.05,
                transmission: 1.0, 
                ior: 1.5,
                thickness: 1.5,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1
            }),
            metal: new THREE.MeshStandardMaterial({
                color: 0x999999,
                metalness: 1.0,
                roughness: 0.2,
            }),
            fire: new THREE.MeshStandardMaterial({
                color: 0x222222,
                emissive: 0xff4500, 
                emissiveIntensity: 2,
                roughness: 0.4,
                metalness: 0.1
            })
        };

        // Initialize Application
        init();

        async function init() {
            const canvas = document.getElementById('webgl-canvas');
            
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            // 2. Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 0, 120);

            // 3. Optimized Renderer for Low-End PCs
            // Disabled antialias and requested high-performance GPU if available
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: false,
                powerPreference: "high-performance"
            });
            // Cap pixel ratio to max 1.25 (prevents freezing on high-res retina screens)
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.25));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;

            // 4. Photorealistic Environment
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 5. Optimized Post-Processing
            const renderScene = new RenderPass(scene, camera);
            
            // Render Bloom at HALF resolution to massively save fill-rate/GPU workload
            const renderTargetSize = new THREE.Vector2(window.innerWidth / 2, window.innerHeight / 2);
            bloomPass = new UnrealBloomPass(renderTargetSize, 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.2;
            bloomPass.intensity = 2.0; 
            bloomPass.radius = 0.5;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // 6. Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 30;
            controls.maxDistance = 300;

            // 7. Load Initial Resources
            await loadAllFonts();
            refreshTextGeometry();
            applyPreset(state.preset);

            // Hide Loading Screen
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 500);

            // 8. Event Listeners
            window.addEventListener('resize', onWindowResize);
            setupUIHandlers();

            // 9. Start Loop
            animate();
        }

        // --- Font Handling ---
        async function loadAllFonts() {
            const loader = new FontLoader();
            
            const loadFont = (url) => {
                return new Promise((resolve, reject) => {
                    loader.load(url, resolve, undefined, reject);
                });
            };

            try {
                const [helvetiker, optimer, gentilis, droid] = await Promise.all([
                    loadFont(fontUrls.helvetiker),
                    loadFont(fontUrls.optimer),
                    loadFont(fontUrls.gentilis),
                    loadFont(fontUrls.droid)
                ]);

                fonts = { helvetiker, optimer, gentilis, droid };
            } catch (error) {
                console.error("Error loading fonts:", error);
                alert("Failed to load 3D fonts. Please check your internet connection.");
            }
        }

        function refreshTextGeometry() {
            if (!fonts[state.fontName]) return;
            
            if (textMesh) {
                scene.remove(textMesh);
                textMesh.geometry.dispose();
            }

            const displayString = state.text.trim() === '' ? ' ' : state.text;

            // Heavily optimized Text Geometry (Lower poly count)
            const textGeo = new TextGeometry(displayString, {
                font: fonts[state.fontName],
                size: 20,
                height: 5, 
                curveSegments: 4,     // Reduced from 12 for performance
                bevelEnabled: true,
                bevelThickness: 0.5,
                bevelSize: 0.3,
                bevelOffset: 0,
                bevelSegments: 2      // Reduced from 5 for performance
            });

            textGeo.computeBoundingBox();
            const centerOffset = - 0.5 * (textGeo.boundingBox.max.x - textGeo.boundingBox.min.x);
            const heightOffset = - 0.5 * (textGeo.boundingBox.max.y - textGeo.boundingBox.min.y);
            textGeo.translate(centerOffset, heightOffset, 0);

            textMesh = new THREE.Mesh(textGeo, materials[state.preset]);
            scene.add(textMesh);
        }

        // --- UI & Preset Logic ---
        function applyPreset(presetId) {
            state.preset = presetId;
            
            if (textMesh) {
                textMesh.material = materials[presetId];
            }

            if (presetId === 'fire') {
                bloomPass.intensity = 2.0; 
                scene.background = new THREE.Color(0x050505); 
            } else if (presetId === 'glass') {
                bloomPass.intensity = 0.2; 
                scene.background = new THREE.Color(0x111111);
            } else if (presetId === 'metal') {
                bloomPass.intensity = 0.4;
                scene.background = new THREE.Color(0x1a1a1a);
            }

            document.querySelectorAll('.preset-btn').forEach(btn => {
                const isActive = btn.dataset.preset === presetId;
                btn.className = `preset-btn flex items-center gap-2 px-5 py-3 rounded-xl transition-all active:scale-95 ${
                    isActive 
                    ? (presetId === 'fire' 
                        ? 'bg-orange-500/20 text-orange-400 border border-orange-500/30 shadow-[0_0_15px_rgba(255,100,0,0.3)]' 
                        : 'bg-white/20 text-white border border-white/30 shadow-[0_0_15px_rgba(255,255,255,0.2)]')
                    : 'hover:bg-white/10 text-gray-400 border border-transparent'
                }`;
            });
        }

        function setupUIHandlers() {
            const textInput = document.getElementById('textInput');
            textInput.addEventListener('input', (e) => {
                state.text = e.target.value;
                refreshTextGeometry();
            });

            const fontSelect = document.getElementById('fontSelect');
            fontSelect.addEventListener('change', (e) => {
                state.fontName = e.target.value;
                refreshTextGeometry();
            });

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    applyPreset(e.currentTarget.dataset.preset);
                });
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Re-calculate half-resolution vector on resize
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.resolution.set(window.innerWidth / 2, window.innerHeight / 2);
        }

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);

            controls.update(); 

            if (state.preset === 'fire' && textMesh) {
                const time = Date.now() * 0.003;
                materials.fire.emissiveIntensity = 2.0 + Math.sin(time) * 0.5;
            }

            composer.render();
        }
    </script>
</body>
</html>
