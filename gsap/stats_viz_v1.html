<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Stats: Expected Value</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP for Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- KaTeX CSS & JS for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        body {
            background-color: #0f172a; /* Slate 900 - Dark mode for glowing graphs */
            color: #f8fafc;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* SVG Graph Styling */
        #graph-container {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: visible;
        }

        .bar {
            fill: #3b82f6; /* Blue 500 */
            opacity: 0;
            transform-origin: bottom;
        }

        .curve {
            stroke: #10b981; /* Emerald 500 */
            stroke-width: 4;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.6));
        }

        .area-fill {
            fill: url(#gradient-emerald);
            opacity: 0;
        }

        /* Math Typography Tweaks */
        .katex-display {
            margin: 0 !important;
            padding: 1rem;
        }
        
        .math-container {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: center;
            opacity: 0;
        }

        /* Grid lines */
        .grid-line {
            stroke: #334155;
            stroke-width: 1;
            stroke-dasharray: 4 4;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Main Card -->
    <div class="w-full max-w-3xl bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden flex flex-col">
        
        <!-- Header -->
        <div class="px-8 py-6 border-b border-slate-700 bg-slate-800/50">
            <h1 class="text-2xl font-bold text-white tracking-tight">Expected Value: <span class="text-blue-400">Discrete</span> vs <span class="text-emerald-400">Continuous</span></h1>
            <p class="text-slate-400 mt-1 text-sm">Visualizing the shift from Summations to Integrals.</p>
        </div>

        <!-- Visualization Stage -->
        <div class="p-8 relative">
            
            <!-- Graph Area -->
            <div id="graph-container" class="mb-8 border-b-2 border-l-2 border-slate-600 pl-2 pb-2">
                <svg viewBox="0 0 600 250" class="w-full h-full" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="gradient-emerald" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#10b981" stop-opacity="0.5" />
                            <stop offset="100%" stop-color="#10b981" stop-opacity="0.0" />
                        </linearGradient>
                    </defs>

                    <!-- Background Grid -->
                    <line x1="0" y1="50" x2="600" y2="50" class="grid-line" />
                    <line x1="0" y1="100" x2="600" y2="100" class="grid-line" />
                    <line x1="0" y1="150" x2="600" y2="150" class="grid-line" />
                    <line x1="0" y1="200" x2="600" y2="200" class="grid-line" />

                    <!-- Discrete Bars (Chunky) -->
                    <g id="discrete-bars">
                        <!-- y attributes represent the top, height is 250 - y -->
                        <rect x="50" y="200" width="40" height="50" class="bar" />
                        <rect x="100" y="150" width="40" height="100" class="bar" />
                        <rect x="150" y="80" width="40" height="170" class="bar" />
                        <rect x="200" y="50" width="40" height="200" class="bar" />
                        <rect x="250" y="30" width="40" height="220" class="bar" />
                        <rect x="300" y="30" width="40" height="220" class="bar" />
                        <rect x="350" y="50" width="40" height="200" class="bar" />
                        <rect x="400" y="80" width="40" height="170" class="bar" />
                        <rect x="450" y="150" width="40" height="100" class="bar" />
                        <rect x="500" y="200" width="40" height="50" class="bar" />
                    </g>

                    <!-- Continuous Curve (Smooth Gaussian) -->
                    <!-- d path calculates a rough bell curve fitting the bars -->
                    <g id="continuous-group">
                        <path id="curve-fill" d="M 30 250 C 150 250, 180 30, 270 30 C 330 30, 450 250, 570 250 Z" class="area-fill" />
                        <path id="main-curve" d="M 30 250 C 150 250, 180 30, 270 30 C 330 30, 450 250, 570 250" class="curve" />
                    </g>
                </svg>
            </div>

            <!-- Math Formula Stage -->
            <div class="relative h-24 bg-slate-900 rounded-xl border border-slate-700 flex items-center justify-center overflow-hidden shadow-inner">
                
                <!-- Initial State -->
                <div id="math-initial" class="math-container text-slate-500 text-lg opacity-100">
                    Select a data type above to view the formula.
                </div>

                <!-- Discrete Formula -->
                <div id="math-discrete" class="math-container text-blue-300 text-2xl">
                    <!-- KaTeX injected here -->
                </div>

                <!-- Continuous Formula -->
                <div id="math-continuous" class="math-container text-emerald-300 text-2xl">
                    <!-- KaTeX injected here -->
                </div>

            </div>
        </div>

        <!-- Controls -->
        <div class="px-8 py-6 bg-slate-800 border-t border-slate-700 flex gap-4">
            <button id="btn-discrete" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-lg shadow-blue-900/50 transform hover:-translate-y-0.5">
                1. Show Discrete Data
            </button>
            <button id="btn-continuous" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-lg shadow-emerald-900/50 transform hover:-translate-y-0.5 opacity-50 cursor-not-allowed" disabled>
                2. Smooth to Continuous
            </button>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // Wait for KaTeX and DOM to load
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. Render Mathematical Formulas using KaTeX
            // Discrete Expected Value: E[X] = sum(x * P(x))
            katex.render("E[X] = \\sum_{x} x \\cdot P(X = x)", document.getElementById('math-discrete'), {
                displayMode: true,
                throwOnError: false
            });

            // Continuous Expected Value: E[X] = integral(x * f(x) dx)
            katex.render("E[X] = \\int_{-\\infty}^{\\infty} x \\cdot f(x) \\,dx", document.getElementById('math-continuous'), {
                displayMode: true,
                throwOnError: false
            });

            // 2. Setup DOM Elements
            const btnDiscrete = document.getElementById('btn-discrete');
            const btnContinuous = document.getElementById('btn-continuous');
            
            let currentState = 'initial'; // initial, discrete, continuous

            // GSAP Default setup
            gsap.set(".bar", { scaleY: 0, opacity: 0 });
            gsap.set("#math-discrete", { y: 20 });
            gsap.set("#math-continuous", { y: 20 });

            // 3. Animation: Show Discrete State
            btnDiscrete.addEventListener('click', () => {
                if(currentState === 'discrete') return;
                currentState = 'discrete';

                // Update UI Buttons
                btnContinuous.disabled = false;
                btnContinuous.classList.remove('opacity-50', 'cursor-not-allowed');

                const tl = gsap.timeline();

                // If coming from continuous, fade out curve first
                if (gsap.getProperty("#main-curve", "opacity") > 0) {
                    tl.to(["#main-curve", "#curve-fill"], { opacity: 0, duration: 0.4 })
                      .to("#math-continuous", { y: -20, opacity: 0, duration: 0.3 }, "<");
                } else {
                    tl.to("#math-initial", { opacity: 0, y: -10, duration: 0.3 });
                }

                // Animate Math Formula in
                tl.to("#math-discrete", { y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.5)" }, "-=0.2");

                // Animate chunky bars springing up (staggered)
                tl.to(".bar", { 
                    scaleY: 1, 
                    opacity: 0.8, 
                    duration: 0.6, 
                    stagger: 0.05, 
                    ease: "elastic.out(1, 0.7)" 
                }, "-=0.3");
            });

            // 4. Animation: Show Continuous State
            btnContinuous.addEventListener('click', () => {
                if(currentState === 'continuous') return;
                currentState = 'continuous';

                const tl = gsap.timeline();

                // 1. Swap the math formulas
                tl.to("#math-discrete", { y: 20, opacity: 0, duration: 0.4, ease: "power2.in" })
                  .to("#math-continuous", { y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.5)" });

                // 2. Morph visually: Fade down the bars
                tl.to(".bar", { opacity: 0.2, duration: 0.5 }, "-=0.5");

                // 3. Draw the smooth curve! (Using stroke-dashoffset trick)
                tl.to("#main-curve", { opacity: 1, duration: 0.1 }, "-=0.3")
                  .to("#main-curve", { strokeDashoffset: 0, duration: 1.5, ease: "power2.inOut" })
                  
                // 4. Fade in the Area under the curve (the integral representation)
                  .to("#curve-fill", { opacity: 1, duration: 0.8, ease: "sine.inOut" }, "-=0.8");
            });

        });
    </script>
</body>
</html>
