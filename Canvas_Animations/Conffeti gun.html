<body>
  <canvas id="c"></canvas>
 <span class="stake"></span>
  <h2>Click and Generate Conffeti</h2>


</body>

<style>
    body{
  align-items:center;
  align-self:center;
  overflow:hidden;
}
#c{
  position:absolute;
  top:0;
  left:0;
}

.stake {
  border-left: 1px solid #000000;
  border-right: 1px solid #000000;
  width: 20px;
  height: 80px;
  display: inline-block;
  position: relative;
  background: #f77474;
  left:50%;
  top:45vh;
}
.stake:before {
  content: "";
  display: inline-block;
  width: 20px;
  height: 8.5px;
  background: #daeae4;
  border: 1px solid #000000;
  border-radius: 100px/50px;
  position: absolute;
  left: -1px;
  top: -6.5px;
  z-index: 2;
}
.stake:after {
  content: "";
  display: inline-block;
  width: 20px;
  height: 12.5px;
  background: #f77474;
  border: 1px solid #000000;
  border-radius: 100px/50px;
  position: absolute;
  left: -1px;
  bottom: -7.5px;
  z-index: -1;
}
h2{
  font-weight:900;
  top:80%;
  position:absolute;
  width:100%;
  text-align:center;
  font-size:.95em;
}
</style>

<script>
    let canvas = document.querySelector('#c')
let _Ctx = canvas.getContext('2d')
let gun = document.querySelector('.stake')
let bounds = gun.getBoundingClientRect()
canvas.width = window.innerWidth
canvas.height = window.innerHeight
let partS  = 50

class particles{
  constructor(x,y,velx,vely,sizeX,sizeY,color){
    this.x = x
    this.y = y
    this.velx = velx
    this.vely = vely
    this.sizeX = sizeX
    this.sizeY = sizeY
    this.color = color
    
  }
  draw(){
_Ctx.save()
_Ctx.beginPath()
_Ctx.rect(this.x, this.y, this.sizeX,this.sizeY);
_Ctx.fillStyle = `${this.color}`
_Ctx.fill()
_Ctx.restore()
  }
  
  update(){
    this.draw()
    this.y += this.vely
     this.x+= this.velx

  }
}
let x 
let y 
let vely

let particle 
let _particles = []
let colors = ['#00ab69','#ff6f32','#ea2e2e','#306fb2','#040406']
let randomC

document.addEventListener('click',()=>{
  for (let i = 0; i < 30; i++) {
    randomC = Math.floor(Math.random() * colors.length)
    y= (bounds.top - 100 )-(Math.random() * 200-150 )
    x =(bounds.left +10) 
     vely = Math.random() * -4-3.5
    velx = Math.random() * 2-2
     _particles.push(new particles(x,y,velx,vely,6.5,20,colors[randomC]))
    // console.log(_particles[0])
  }
})


function animations(){
  window.requestAnimationFrame(animations)
  // particle.update()
  _Ctx.clearRect(0,0,canvas.width,canvas.height)
   _particles.forEach((p,index)=>{
    
      if(p.y < 150){
        p.vely += .2
      p.sizeX -= .085
      p.sizeY -= .085
      
        
      }
     
     if(p.sizeX < 0){
       _particles.splice(index,1)
     }
     p.update()
   })
}
animations()
</script>
