<canvas id = 'canv'></canvas>

<style>
    body{
  width:100%; 
  margin:0;
  overflow:hidden;
  background:hsla(0,0%,5%,1);
}
canvas{
  position:absolute;
  top:50%;
  left:50%; 
  transform:translate(-50%,-50%);
  box-shadow: 0 12px 15px 0 hsla(0, 0%, 0%, 0.20),0 17px 50px 0 hsla(0, 0%, 0%, 0.15);
}
</style>

<script>
    var c = document.getElementById("canv");
var $ = c.getContext("2d");
c.width = window.innerWidth/1.05;
c.height = window.innerHeight/1.2;
$.fillRect(0, 0, c.width, c.height);
var num=500;
var rad=.99**(-Math.PI*0.7);
var o = []; var _o;
function draw() {
  for (var i=0; i<num; i++) {
    if (o.length<num) o[i]=i/num;
    _o = o[0];
    if (o[i]+1/num>1) o[i]=0;
    o[i] = o[i]+0.0075/(0.0075 + rad);
    $.fillStyle='hsla('+i+2+',100%,50%,'+o[i]+')';
    $.beginPath();
    $.setTransform(Math.cos(rad*(i*2)), -Math.sin(rad*(i*2)),-Math.sin(rad*(i*2)), -Math.cos(rad*(i*2)),c.width/2,c.height/2);
    $.fillRect(-2*(num**o[i -1])-1,2*(num**o[i- 1])-1,c.width,c.height);
    $.fill();
  }
  window.requestAnimationFrame(draw);
};
draw();
window.addEventListener('resize', function(){
  if(c.width!=window.innerWidth 
    && c.height!=window.innerHeight){
    c.width = window.innerWidth/1.05;
    c.height = window.innerHeight/1.2;}
}, false);


</script>
