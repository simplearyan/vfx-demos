<style>
    body {
    font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    margin: 0;
    background: #181818;
    text-align: center;
  position: relative;
}
#canvas {
    margin: 0 auto;
    display: block;
}
p{
    color: #eee;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 1px;
    margin: 30px 0 60px;
    display: inline-block;
}
a{
  color: #eee;
}
* { box-sizing: border-box }
$triangleSize: 7em;
$gitGray: #24292e;
a.git {
  position: absolute;
  display: block;
  color: #fff;
  right: 0;
  top: 0;
  width: $triangleSize;
  height: $triangleSize;
  cursor: pointer;
  overflow: hidden;
  font-family: sans-serif;  
  &:after {
    position: absolute;
    content: 'fork me'; 
    letter-spacing: 4px;
    transform: rotate(45deg) translate(-50px, -38px);
    bottom: 0;
    left: 0;
    width: 13em;
    font-weight: bold;
    margin: -5px;
    font-size: 12px;
    text-transform: uppercase;
    text-align: center;
    transition: .3s ease all;
  }
  &:before {
    position: absolute;
    content: '';
    right: 0;
    top: 0;
    border-top: $triangleSize/2 solid $gitGray;
    border-right: $triangleSize/2 solid $gitGray;
    border-left: $triangleSize/2 solid transparent;
    border-bottom: $triangleSize/2 solid transparent;
    width: 0%;
    height: 0%;
  }
  &:hover {
    color: rgba(255,255,255,.7)
  }
  .octicon {
    position: absolute;
    z-index: 1;
    top: 0;
    right: 0;
    margin: 10px;
    transform: rotate(45deg);
  }
}
.octicon {
  display: inline-block;
  vertical-align: text-top;
  fill: currentColor;
  transition: .3s ease all;
}
</style>


<script>
    var planets = [
  "sun",
  "mercury",
  "venus",
  "earth",
  "moon",
  "mars",
  "jupiter",
  "saturn",
  "uranus",
  "neptune",
  "pluto",
],
  scale = [1, 9, 7, 6, 11, 8, 2, 3, 4, 5, 10],
  orbitV = [0.8, 47.4, 35.0, 29.8, 1.0, 24.1, 13.1, 9.7, 6.8, 5.4, 4.7];
(moon = {}),
  (canvasX = document.getElementById("canvas").width),
  (canvasY = document.getElementById("canvas").height);

function loadPlanets() {
  planets.forEach(function (el, i, arr) {
    var star = {};
    star.name = el;
    star.img = new Image();
    star.img.src =
      "https://raw.githubusercontent.com/suekam/canvas-solar-system/master/images/" +
      el +
      ".png";
    star.scale = scale[i];
    star.orbitV = orbitV[i];
    arr[i] = star;
  });

  // Extract the moon from the planets array because it's treated differently
  planets.forEach(function (el, i, arr) {
    if (planets[i].name === "moon") {
      moon = planets[i];
      planets.splice(i, 1);
    }
  });
}

function printImg(img, x, y, w, h) {
  var ctx = document.getElementById("canvas").getContext("2d");
  ctx.drawImage(img, x, y, w, h);
}

function drawMoon(earth, time) {
  var ctx = document.getElementById("canvas").getContext("2d");

  moon.w = (moon.img.width * (1 / moon.scale) * 1) / 2;
  moon.h = (moon.img.height * (1 / moon.scale) * 1) / 2;

  var moonOrbitRadius = 50; // Distance of the moon from Earth

  // Calculate the moon's position relative to the Earth's position
  var moonAngle =
    ((((2 * Math.PI) / 60) * time.getSeconds() +
      ((2 * Math.PI) / 60000) * time.getMilliseconds()) *
      moon.orbitV) /
    6;

  var moonX = earth.x + moonOrbitRadius * Math.cos(moonAngle) - moon.w / 2;
  var moonY = earth.y + moonOrbitRadius * Math.sin(moonAngle) - moon.h / 2;

  ctx.beginPath();
  ctx.arc(earth.x, earth.y, moonOrbitRadius, 0, Math.PI * 2, false); // Moon's orbit
  ctx.stroke();

  // Draw the moon
  printImg(moon.img, moonX, moonY, moon.w, moon.h);
}

function draw() {
  var ctx = document.getElementById("canvas").getContext("2d");
  ctx.clearRect(0, 0, canvasX, canvasY);

  ctx.fillStyle = "#181818";
  ctx.fillRect(0, 0, canvasX, canvasY);

  ctx.fillStyle = "rgba(255,255,255,.008)";
  ctx.strokeStyle = "rgba(89,153,188,0.15)";
  ctx.save();
  ctx.translate(canvasX / 2, canvasY / 2);
  var pos = 0;
  var time = new Date();

  for (var i = 0; i < planets.length; i++) {
    ctx.save();

    var w = (planets[i].img.width * (1 / planets[i].scale) * 1) / 2,
      h = (planets[i].img.height * (1 / planets[i].scale) * 1) / 2,
      x = pos - w / 2,
      y = 0 - h / 2;

    ctx.rotate(
      ((((2 * Math.PI) / 60) * time.getSeconds() +
        ((2 * Math.PI) / 60000) * time.getMilliseconds()) *
        planets[i].orbitV) /
        6
    );

    if (i !== 0) {
      ctx.beginPath();
      ctx.arc(0, 0, Math.abs(x) + w / 2, 0, Math.PI * 2, false); // Planet's orbit
      ctx.stroke();
    }

    printImg(planets[i].img, x, y, w, h);

    if (planets[i].name === "earth") {
      // Pass the Earth's position and size to the drawMoon function
      drawMoon({ x, y, w, h }, time);
    }

    pos = pos + w / 1.5 + 30;
    ctx.restore();
  }

  ctx.restore();
  window.requestAnimationFrame(draw);
}

function init() {
  loadPlanets();
  window.requestAnimationFrame(draw);
}

window.onload = function () {
  init();
};

</script>
