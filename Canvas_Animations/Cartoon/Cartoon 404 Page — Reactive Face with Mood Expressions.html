<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 — Lost in Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="face-wrap" id="faceWrap">

  <!-- floating sparkles -->
  <span class="sparkle" style="top:-30px;left:-50px;animation-delay:.2s">✦</span>
  <span class="sparkle" style="top:-10px;right:-60px;animation-delay:1.1s">✧</span>
  <span class="sparkle" style="top:40px;left:-80px;animation-delay:2.1s">✦</span>
  <span class="sparkle" style="bottom:20px;right:-70px;animation-delay:.7s">✧</span>

  <!-- 404 DIGITS + FACE -->
  <div class="digits">

    <!-- LEFT 4 -->
    <div class="d d-four-l" aria-hidden="true">4</div>

    <!-- ZERO = HEAD -->
    <div class="d-zero" id="head">

      <!-- eyebrows -->
      <div class="brows" id="browsWrap">
        <svg viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg">
          <path class="brow-l" id="browL" d="M 5 15 Q 25 5 45 12"/>
          <path class="brow-r" id="browR" d="M 55 12 Q 75 5 95 15"/>
        </svg>
      </div>

      <!-- eyes -->
      <div class="eyes" id="eyes">
        <div class="eye" id="eyeL">
          <div class="pupil" id="pupilL"></div>
        </div>
        <div class="eye" id="eyeR">
          <div class="pupil" id="pupilR"></div>
        </div>
      </div>

      <!-- sweat drop -->
      <div class="sweat"></div>

      <!-- mood tag -->
      <div class="mood" id="moodTag">lost :(</div>
    </div>

    <!-- RIGHT 4 -->
    <div class="d d-four-r" aria-hidden="true">4</div>
  </div>

  <!-- MOUTH -->
  <div class="mouth-wrap" id="mouthWrap">
    <svg viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg" width="100%">
      <path id="mouthPath" d="M 10 30 Q 60 5 110 30"/>
    </svg>
  </div>

  <!-- ground shadow -->
  <div class="shadow"></div>
</div>

<!-- TEXT -->
<div class="text-block">
  <h2>Oops! Page not found.</h2>
  <p>Looks like this page wandered off somewhere...</p>
</div>

<script src="sketch.js"></script>
</body>
</html>


<style>
    /* ── RESET ── */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── PAGE ── */
html, body {
  width: 100%; height: 100%;
  background: #f0f0ee;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  color: #1a1a1a;
}

/* subtle dot grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, #c8c8c4 1px, transparent 1px);
  background-size: 28px 28px;
  opacity: .45;
  pointer-events: none;
}

/* ── FACE CONTAINER ── */
.face-wrap {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 0;
  animation: float 3.8s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-18px); }
}

/* ── 404 ROW ── */
.digits {
  display: flex;
  align-items: center;
  gap: 6px;
  line-height: 1;
}

/* individual digit */
.d {
  font-size: clamp(90px, 18vw, 160px);
  font-weight: 900;
  letter-spacing: -4px;
  color: #1a1a1a;
  position: relative;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
}

/* ── THE "0" IS THE FACE HEAD ── */
.d-zero {
  position: relative;
  width:  clamp(88px, 17vw, 152px);
  height: clamp(88px, 17vw, 152px);
  border-radius: 50%;
  border: clamp(8px, 1.6vw, 14px) solid #1a1a1a;
  background: #f0f0ee;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  animation: headBob 3.8s ease-in-out infinite;
}

@keyframes headBob {
  0%, 100% { transform: scaleY(1); }
  50%       { transform: scaleY(1.04); }
}

/* ── EYES ── */
.eyes {
  display: flex;
  gap: clamp(12px, 2.8vw, 26px);
  margin-bottom: clamp(4px, .8vw, 8px);
}

.eye {
  width:  clamp(10px, 2vw, 18px);
  height: clamp(10px, 2vw, 18px);
  border-radius: 50%;
  background: #1a1a1a;
  position: relative;
  transition: transform .2s;
  flex-shrink: 0;
}

.pupil {
  width: 45%; height: 45%;
  border-radius: 50%;
  background: #f0f0ee;
  position: absolute;
  top: 10%; left: 55%;
  transition: transform .08s linear;
}

/* blink */
.eye.blink { animation: blink .12s ease-in-out forwards; }

@keyframes blink {
  0%, 100% { transform: scaleY(1); }
  50%       { transform: scaleY(0.07); }
}

/* ── MOUTH ── */
.mouth-wrap {
  position: absolute;
  bottom: clamp(-32px, -5.5vw, -20px);
  left: 50%;
  transform: translateX(-50%);
  width: clamp(80px, 14vw, 120px);
  pointer-events: none;
}
.mouth-wrap svg { overflow: visible; display: block; }

#mouthPath {
  fill: none;
  stroke: #1a1a1a;
  stroke-width: clamp(6px, 1.2vw, 11px);
  stroke-linecap: round;
  transition: d .5s cubic-bezier(.34, 1.3, .64, 1);
}

/* ── SWEAT DROP ── */
.sweat {
  position: absolute;
  top:   clamp(8px,  1.5vw, 14px);
  right: clamp(-18px, -3vw, -10px);
  width:  clamp(10px, 2vw,  18px);
  height: clamp(14px, 2.8vw, 24px);
  background: #6ec6f5;
  border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
  transform: rotate(20deg);
  opacity: 0;
  animation: sweatDrop 3.8s ease-in-out infinite;
  filter: drop-shadow(0 2px 4px rgba(110,198,245,.4));
}

@keyframes sweatDrop {
  0%,  60% { opacity: 0; transform: rotate(20deg) translateY(0); }
  70%       { opacity: 1; transform: rotate(20deg) translateY(0); }
  100%      { opacity: 0; transform: rotate(20deg) translateY(20px); }
}

/* ── EYEBROWS ── */
.brows {
  position: absolute;
  top: clamp(-12px, -2.2vw, -8px);
  left: 50%;
  transform: translateX(-50%);
  width: clamp(60px, 12vw, 100px);
  pointer-events: none;
}
.brows svg { overflow: visible; display: block; width: 100%; }

.brow-l, .brow-r {
  fill: none;
  stroke: #1a1a1a;
  stroke-width: clamp(5px, 1vw, 9px);
  stroke-linecap: round;
  transition: d .45s cubic-bezier(.34, 1.3, .64, 1);
}

/* ── SPARKLES ── */
.sparkle {
  position: absolute;
  font-size: clamp(14px, 2.5vw, 22px);
  opacity: 0;
  pointer-events: none;
  animation: sparkle 3s ease-in-out infinite;
}

@keyframes sparkle {
  0%, 80%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
  40%            { opacity: 1; transform: scale(1) rotate(180deg); }
}

/* ── TEXT BELOW ── */
.text-block {
  margin-top: clamp(48px, 8vw, 72px);
  text-align: center;
  position: relative; z-index: 1;
}

.text-block h2 {
  font-size: clamp(18px, 3.5vw, 28px);
  font-weight: 900;
  color: #1a1a1a;
  margin-bottom: 10px;
  letter-spacing: -.02em;
}

.text-block p {
  font-size: clamp(13px, 2vw, 16px);
  color: #888;
  font-weight: 800;
  letter-spacing: .01em;
}

/* ── GROUND SHADOW ── */
.shadow {
  width:  clamp(120px, 20vw, 180px);
  height: 14px;
  background: rgba(0,0,0,.12);
  border-radius: 50%;
  margin-top: clamp(-8px, -1vw, -4px);
  animation: shadowPulse 3.8s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes shadowPulse {
  0%, 100% { transform: scaleX(1);    opacity: .12; }
  50%       { transform: scaleX(.75); opacity: .06; }
}

/* ── MOOD TAG ── */
.mood {
  position: absolute;
  top:   clamp(-22px, -4vw,  -14px);
  right: clamp(-60px, -10vw, -40px);
  background: #1a1a1a; color: #f0f0ee;
  font-size: clamp(9px, 1.4vw, 12px);
  font-weight: 900; letter-spacing: .06em;
  padding: 4px 10px; border-radius: 100px;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity .4s;
  white-space: nowrap;
  pointer-events: none;
}
.mood.show { opacity: 1; }
</style>

<script>
    'use strict';

/* ══════════════════════════
   PUPIL TRACKING
══════════════════════════ */
const eyeL   = document.getElementById('eyeL');
const eyeR   = document.getElementById('eyeR');
const pupilL = document.getElementById('pupilL');
const pupilR = document.getElementById('pupilR');

function trackEye(eye, pupil, mx, my) {
  const r   = eye.getBoundingClientRect();
  const ecx = r.left + r.width  / 2;
  const ecy = r.top  + r.height / 2;
  const dx  = mx - ecx;
  const dy  = my - ecy;
  const dist = Math.min(Math.hypot(dx, dy), r.width * .28);
  const ang  = Math.atan2(dy, dx);
  pupil.style.transform = `translate(${Math.cos(ang) * dist}px, ${Math.sin(ang) * dist}px)`;
}

window.addEventListener('mousemove', e => {
  trackEye(eyeL, pupilL, e.clientX, e.clientY);
  trackEye(eyeR, pupilR, e.clientX, e.clientY);
  updateMood(e.clientX, e.clientY);
});

window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  trackEye(eyeL, pupilL, t.clientX, t.clientY);
  trackEye(eyeR, pupilR, t.clientX, t.clientY);
  updateMood(t.clientX, t.clientY);
}, { passive: true });

/* ══════════════════════════
   MOOD EXPRESSIONS
══════════════════════════ */
const mouthPath = document.getElementById('mouthPath');
const browL     = document.getElementById('browL');
const browR     = document.getElementById('browR');
const moodTag   = document.getElementById('moodTag');

const MOODS = [
  {
    mouth:    'M 10 32 Q 60 10 110 32',
    bl:       'M 5 12 Q 25 4  45 14',
    br:       'M 55 14 Q 75 4  95 12',
    label:    'devastated 😭',
    reversed: true
  },
  {
    mouth:    'M 10 28 Q 60 12 110 28',
    bl:       'M 5 13 Q 25 5  45 13',
    br:       'M 55 13 Q 75 5  95 13',
    label:    'sad :(',
    reversed: true
  },
  {
    mouth:    'M 15 20 Q 60 20 105 20',
    bl:       'M 5 10 Q 25 8  45 10',
    br:       'M 55 10 Q 75 8  95 10',
    label:    'meh :|',
    reversed: false
  },
  {
    mouth:    'M 10 14 Q 60 36 110 14',
    bl:       'M 5 10 Q 25 4  45 10',
    br:       'M 55 10 Q 75 4  95 10',
    label:    'happy :)',
    reversed: false
  },
  {
    mouth:    'M 8 10 Q 60 42 112 10',
    bl:       'M 5 12 Q 25 3  45 8',
    br:       'M 55 8  Q 75 3  95 12',
    label:    'ecstatic 🥳',
    reversed: false
  }
];

let lastMood = -1;

function updateMood(mx, my) {
  const frac = my / window.innerHeight;
  const idx  = Math.round(frac * (MOODS.length - 1));
  if (idx === lastMood) return;
  lastMood = idx;
  applyMood(MOODS[idx]);

  moodTag.textContent = MOODS[idx].label;
  moodTag.classList.add('show');
  clearTimeout(moodTag._t);
  moodTag._t = setTimeout(() => moodTag.classList.remove('show'), 1400);
}

function applyMood(m) {
  mouthPath.setAttribute('d', m.mouth);
  browL.setAttribute('d', m.bl);
  browR.setAttribute('d', m.br);
  mouthPath.style.transform = m.reversed
    ? 'scaleY(-1) translateY(-40px)'
    : 'none';
}

// init default — sad
applyMood(MOODS[1]);

/* ══════════════════════════
   RANDOM BLINK
══════════════════════════ */
function scheduleBlink() {
  const delay = 2000 + Math.random() * 3500;
  setTimeout(() => {
    blink();
    scheduleBlink();
  }, delay);
}

function blink() {
  eyeL.classList.add('blink');
  eyeR.classList.add('blink');
  setTimeout(() => {
    eyeL.classList.remove('blink');
    eyeR.classList.remove('blink');
  }, 150);
}

scheduleBlink();

/* ══════════════════════════
   CLICK — SURPRISED FACE
══════════════════════════ */
const head = document.getElementById('head');

head.addEventListener('click', () => {
  head.style.transition = 'transform .15s';
  head.style.transform  = 'scale(1.18) rotate(-4deg)';

  mouthPath.setAttribute('d', 'M 30 12 Q 60 12 90 12');
  mouthPath.style.transform = 'none';
  browL.setAttribute('d', 'M 5 16 Q 25 3 45 16');
  browR.setAttribute('d', 'M 55 16 Q 75 3 95 16');

  eyeL.style.transform = 'scale(1.5)';
  eyeR.style.transform = 'scale(1.5)';

  setTimeout(() => {
    head.style.transform = '';
    eyeL.style.transform = '';
    eyeR.style.transform = '';
    applyMood(MOODS[lastMood > -1 ? lastMood : 1]);
  }, 500);
});

/* ══════════════════════════
   TOUCH support for mood
══════════════════════════ */
window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  updateMood(t.clientX, t.clientY);
}, { passive: true });
</script>
