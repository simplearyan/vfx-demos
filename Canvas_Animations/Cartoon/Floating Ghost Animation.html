<div class="ghost-container">
  <div class="ghost">
    <div class="face">
      <div class="eyes">
        <div class="eye left"></div>
        <div class="eye right"></div>
      </div>
      <div class="mouth"></div>
    </div>
    <div class="bottom-waves">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>
  </div>
</div>

<style>
    body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
}

.ghost-container {
  position: relative;
  width: 200px;
  height: 250px;
}

.ghost {
  position: absolute;
  width: 120px;
  height: 160px;
  background: #f8f8f8;
  border-radius: 60px 60px 0 0;
  animation: float 3s ease-in-out infinite;
  box-shadow: 0 10px 20px rgba(248, 248, 248, 0.2);
}

/* Ghost face */
.face {
  position: absolute;
  top: 40px;
  left: 30px;
  width: 60px;
}

.eyes {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.eye {
  width: 18px;
  height: 24px;
  background: #333;
  border-radius: 50%;
  animation: blink 4s infinite;
}

.mouth {
  width: 30px;
  height: 10px;
  margin: 0 auto;
  background: #333;
  border-radius: 0 0 15px 15px;
}

/* Wavy bottom */
.bottom-waves {
  position: absolute;
  bottom: -10px;
  width: 100%;
  height: 20px;
  overflow: hidden;
}

.wave {
  position: absolute;
  bottom: 0;
  width: 140px;
  height: 20px;
  background: #f8f8f8;
  border-radius: 50%;
}

.wave:nth-child(1) {
  left: -30px;
  animation: wave1 3s ease-in-out infinite;
}
.wave:nth-child(2) {
  left: -10px;
  animation: wave2 3s ease-in-out infinite -0.5s;
}
.wave:nth-child(3) {
  left: -20px;
  animation: wave3 3s ease-in-out infinite -1s;
}

/* Animations */
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(2deg); }
}

@keyframes wave1 {
  0%, 100% { transform: translateX(0) scaleY(1); }
  50% { transform: translateX(10px) scaleY(0.8); }
}
@keyframes wave2 {
  0%, 100% { transform: translateX(5px) scaleY(0.9); }
  50% { transform: translateX(-5px) scaleY(1.1); }
}
@keyframes wave3 {
  0%, 100% { transform: translateX(-5px) scaleY(1.1); }
  50% { transform: translateX(5px) scaleY(0.9); }
}

@keyframes blink {
  0%, 45%, 55%, 100% { height: 24px; }
  50% { height: 2px; }
}
</style>

<script>
    // Make ghost follow mouse (optional)
const ghost = document.querySelector('.ghost-container');
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
const ease = 0.05;
const maxMove = 30;

// Track mouse movement
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// Smooth follow animation
function followMouse() {
  const rect = ghost.getBoundingClientRect();
  const ghostX = rect.left + rect.width / 2;
  const ghostY = rect.top + rect.height / 2;
  
  const dx = (mouseX - ghostX) * ease;
  const dy = (mouseY - ghostY) * ease;
  
  // Limit maximum movement
  const limitedX = Math.max(-maxMove, Math.min(maxMove, dx));
  const limitedY = Math.max(-maxMove, Math.min(maxMove, dy));
  
  ghost.style.transform = `translate(${limitedX}px, ${limitedY}px)`;
  
  requestAnimationFrame(followMouse);
}

// Start following
followMouse();

// Random blinks (optional)
setInterval(() => {
  const eyes = document.querySelectorAll('.eye');
  eyes.forEach(eye => {
    eye.style.height = '2px';
    setTimeout(() => {
      eye.style.height = '24px';
    }, 200);
  });
}, 5000);
</script>
