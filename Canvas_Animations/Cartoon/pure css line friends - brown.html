    <style>
        * {
  position: relative;
  box-sizing: border-box;
}
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #ececec;
}

/*-----------------*/
/* Face
/*-----------------*/
.face {
  background-color: #905c47;
  width: 330px;
  height: 290px;
  margin-top: 50px;
  border-radius: 50%;
  border: 8px solid;
}
/*-----------------*/
/* Ears
/*-----------------*/
.ears {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  width: 280px;
  height: 120px;
}
.ears {
  .left, .right {
    background-color: #905c47;
    width: 90px;
    height: 120px;
    border-radius: 50%;
    border: 8px solid;
    position: absolute;
    top: 0;
  }
  .left {
    transform: rotate(-20deg);
    left: 0;
  }
  .right {
    transform: rotate(20deg);
    right: 0;
  }
  .shadow {
    background-color: #63382c;
    width: 45px;
    height: 60px;
    border-radius: 50%;
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
}

.face-cover {
  background-color: #905c47;
  width: calc(330px - 16px);
  height: calc(290px - 15px);
  border-radius: 50%;
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
}

/*-----------------*/
/* Eyes
/*-----------------*/
.eyes {
  width: 70px;
  height: 25px;
  /* border: 1px solid; */
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  .left, .right {
    background-color: #000;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    position: absolute;
    top: 0;
  }
  .left {
    left: 0;
  }
  .right {
    right: 0;
  }
}

/*-----------------*/
/* Nose
/*-----------------*/
.nose-area {
  background-color: #eed6c9;
  width: 75px;
  height: 95px;
  border-radius: 50%;
  position: absolute;
  top: 102px;
  left: 50%;
  transform: translateX(-50%);
}
.nose {
  background-color: #000;
  width: 25px;
  height: 25px;
  border-radius: 50%;
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
}

/*-----------------*/
/* Mouth
/*-----------------*/
.philtrum {
  background-color: #000;
  width: 7px;
  height: 22px;
  top: 33px;
  left: 50%;
  transform: translateX(-50%);
}
.mouse-lg {
  background-color: #000;
  width: 7px;
  height: 32px;
  border-radius: 0 0 50px 50px;
  top: 28px;
  left: 40%;
  transform: translateX(-50%) rotate(30deg);
}
.mouse-sm {
  background-color: #000;
  width: 7px;
  height: 22px;
  border-radius: 0 0 50px 50px;
  top: -3px;
  left: 62%;
  transform: translateX(-50%) rotate(-50deg);
}
/*-----------------*/
/* Blush
/*-----------------*/
.blush {
  width: 280px;
  height: 100px;
  /* border: 1px solid; */
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  .left, .right {
    background-color: #a4523d;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    filter: blur(12px);
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  .left {
    left: 0;
  }
  .right {
    right: 0;
  }
}
    </style>
