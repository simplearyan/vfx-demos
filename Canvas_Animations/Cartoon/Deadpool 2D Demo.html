<script>
    const deadpool = document.querySelector('.deadpool')

const getMatrix = element => new WebKitCSSMatrix(window.getComputedStyle(element).transform)

const translationStep = 50

let timeout
const lapse = 300

const walk = () => {
    deadpool.classList.add('walk')

    timeout && clearTimeout(timeout)

    timeout = setTimeout(() => deadpool.classList.remove('walk'), lapse)
}

const moveUp = () => {
    console.log('move up')

    const matrix = getMatrix(deadpool)

    deadpool.style.transform = `translate(${matrix.m41}px, ${matrix.m42 - translationStep}px)`

    walk()
}

const moveDown = () => {
    console.log('move down')

    const matrix = getMatrix(deadpool)

    deadpool.style.transform = `translate(${matrix.m41}px, ${matrix.m42 + translationStep}px)`

    walk()
}

const moveLeft = () => {
    console.log('move left')

    const matrix = getMatrix(deadpool)

    deadpool.style.transform = `translate(${matrix.m41 - translationStep}px, ${matrix.m42}px)`

    walk()
}

const moveRight = () => {
    console.log('move right')

    const matrix = getMatrix(deadpool)

    deadpool.style.transform = `translate(${matrix.m41 + translationStep}px, ${matrix.m42}px)`

    walk()
}

const [keyLeft, keyUp, keyDown, keyRight] = document.querySelectorAll('button')

keyLeft.onclick = moveLeft
keyUp.onclick = moveUp
keyDown.onclick = moveDown
keyRight.onclick = moveRight

const keys = {
    ArrowUp: keyUp,
    ArrowDown: keyDown,
    ArrowLeft: keyLeft,
    ArrowRight: keyRight
}

let key

document.addEventListener('keydown', ({ code }) => ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(code) && (
    (key = keys[code]).click() || key.classList.add('active')))

document.addEventListener('keyup', () => ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].forEach(code => keys[code].classList.remove('active')))
</script>
