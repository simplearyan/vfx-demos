<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math FX: Smooth Light Painting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* UI Overlay Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
        }

        .glass-panel {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: auto;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
        }

        .nav-btn {
            width: 100%;
            text-align: left;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-size: 0.875rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .nav-btn.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-left: 3px solid #60a5fa;
        }

        .category-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6b7280;
            font-weight: 700;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }

        #presentation-text {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 5;
        }
        .glow-text {
            text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Canvas for Smooth Light Painting FX -->
    <canvas id="fxCanvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-layer">
        
        <!-- Left Sidebar Navigation -->
        <div class="glass-panel w-72 h-full flex flex-col">
            <div class="p-6 border-b border-white/10">
                <h1 class="text-2xl font-bold tracking-tight text-white drop-shadow-md flex items-center gap-2">
                    <i data-lucide="waves" class="text-blue-400"></i>
                    Math<span class="text-purple-500 font-light">FX</span>
                </h1>
                <p class="text-xs text-gray-400 font-medium tracking-wide mt-1 uppercase">Organic Light Studio</p>
            </div>

            <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-1">
                <div class="category-title">Vectors</div>
                <button class="nav-btn active" data-topic="vector-add"><i data-lucide="arrow-up-right" class="w-4 h-4"></i> Vector Addition</button>
                <button class="nav-btn" data-topic="vector-scale"><i data-lucide="maximize-2" class="w-4 h-4"></i> Scalar Multiplication</button>

                <div class="category-title">Matrices & Data</div>
                <button class="nav-btn" data-topic="matrix-size"><i data-lucide="grid-3x3" class="w-4 h-4"></i> Rows & Columns</button>

                <div class="category-title">Matrix Operations</div>
                <button class="nav-btn" data-topic="matrix-add"><i data-lucide="plus-square" class="w-4 h-4"></i> Addition</button>
                <button class="nav-btn" data-topic="matrix-scale"><i data-lucide="scaling" class="w-4 h-4"></i> Scalar Multiplication</button>
                <button class="nav-btn" data-topic="matrix-transpose"><i data-lucide="flip-vertical" class="w-4 h-4"></i> Transpose (T)</button>

                <div class="category-title">Matrix Types</div>
                <button class="nav-btn" data-topic="type-rect">Rectangular & Square</button>
                <button class="nav-btn" data-topic="type-diagonal">Diagonal Matrix</button>
                <button class="nav-btn" data-topic="type-scalar">Scalar Matrix</button>
                <button class="nav-btn" data-topic="type-identity">Identity Matrix (I)</button>
                <button class="nav-btn" data-topic="type-zero">Zero Matrix (0)</button>
                <button class="nav-btn" data-topic="type-triangular">Triangular Matrix</button>
            </div>
            
            <div class="p-4 border-t border-white/10">
                <button id="btnReplay" class="w-full py-3 bg-white/10 hover:bg-white/20 rounded-xl font-semibold text-sm transition-colors flex items-center justify-center gap-2 text-white pointer-events-auto">
                    <i data-lucide="play" class="w-4 h-4"></i> Replay Animation
                </button>
            </div>
        </div>

        <div id="presentation-text" class="flex-1 flex flex-col items-center justify-start pt-12">
            <h2 id="titleText" class="text-4xl font-bold tracking-widest uppercase text-white glow-text mb-2 transition-opacity duration-500 opacity-0">Title</h2>
            <p id="subText" class="text-xl text-gray-300 font-light transition-opacity duration-500 opacity-0">Subtitle description</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- Canvas Setup ---
        const canvas = document.getElementById('fxCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, centerX, centerY;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = 288 + (width - 288) / 2;
            centerY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Simplified, Organic Light Engine ---
        let persistentPaths = []; 
        let activeTracers = []; 
        let activeFlashes = [];
        let textsToDraw = []; 

        // Easing function for smooth, organic movement
        function easeInOutSine(x) {
            return -(Math.cos(Math.PI * x) - 1) / 2;
        }

        // Draws a beautiful, dual-layered neon tube
        function drawNeonLine(ctx, sx, sy, ex, ey, color, width, isArrow) {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Outer Glowing Halo
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.strokeStyle = color;
            ctx.lineWidth = width * 4;
            ctx.shadowBlur = 25;
            ctx.shadowColor = color;
            ctx.stroke();

            // Inner Bright Core
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = width * 0.8;
            ctx.shadowBlur = 0;
            ctx.stroke();

            if (isArrow) {
                const angle = Math.atan2(ey - sy, ex - sx);
                const headLen = 16 + width;
                
                // Halo Arrow
                ctx.beginPath();
                ctx.moveTo(ex, ey);
                ctx.lineTo(ex - headLen * Math.cos(angle - Math.PI/6), ey - headLen * Math.sin(angle - Math.PI/6));
                ctx.lineTo(ex - headLen * Math.cos(angle + Math.PI/6), ey - headLen * Math.sin(angle + Math.PI/6));
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                ctx.fill();

                // Core Arrow
                ctx.beginPath();
                ctx.moveTo(ex, ey);
                ctx.lineTo(ex - headLen * Math.cos(angle - Math.PI/6), ey - headLen * Math.sin(angle - Math.PI/6));
                ctx.lineTo(ex - headLen * Math.cos(angle + Math.PI/6), ey - headLen * Math.sin(angle + Math.PI/6));
                ctx.closePath();
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 0;
                ctx.fill();
            }
        }

        function animateLoop() {
            // Smooth fade effect for the background trail
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)'; 
            ctx.fillRect(0, 0, width, height);

            ctx.globalCompositeOperation = 'lighter';

            // Draw completed paths
            persistentPaths.forEach(p => drawNeonLine(ctx, p.sx, p.sy, p.ex, p.ey, p.color, p.width, p.isArrow));

            // Draw actively animating paths (organic growth)
            const now = performance.now();
            activeTracers.forEach(t => {
                let progress = (now - t.startTime) / t.duration;
                if (progress >= 1) {
                    progress = 1;
                    t.done = true;
                }
                
                const easeP = easeInOutSine(progress);
                const cx = t.sx + (t.ex - t.sx) * easeP;
                const cy = t.sy + (t.ey - t.sy) * easeP;

                // Draw line up to current point
                drawNeonLine(ctx, t.sx, t.sy, cx, cy, t.color, t.width, false);

                // Draw bright glowing drawing head (the "wand")
                ctx.beginPath();
                ctx.arc(cx, cy, t.width * 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 30;
                ctx.shadowColor = t.color;
                ctx.fill();
            });
            activeTracers = activeTracers.filter(t => !t.done);

            // Draw text flashes (organic pop-ins)
            activeFlashes.forEach(f => {
                f.life -= f.decay;
                if (f.life > 0) {
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size * (1 - f.life), 0, Math.PI * 2);
                    ctx.fillStyle = f.color;
                    ctx.globalAlpha = f.life;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            });
            activeFlashes = activeFlashes.filter(f => f.life > 0);

            // Draw Persistent Texts
            textsToDraw.forEach(t => {
                ctx.font = t.font;
                ctx.fillStyle = t.color;
                ctx.shadowBlur = t.glow;
                ctx.shadowColor = t.color;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(t.text, t.x, t.y);
            });
            ctx.shadowBlur = 0;

            requestAnimationFrame(animateLoop);
        }
        animateLoop();

        // --- Choreography Engine ---
        let isPlaying = false;
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function setTitles(title, sub, color = '#ffffff') {
            const t = document.getElementById('titleText');
            const s = document.getElementById('subText');
            t.style.opacity = 0;
            s.style.opacity = 0;
            setTimeout(() => {
                t.textContent = title;
                t.style.color = color;
                s.textContent = sub;
                t.style.opacity = 1;
                s.style.opacity = 1;
            }, 300);
        }

        function clearScene() {
            activeTracers = [];
            persistentPaths = [];
            activeFlashes = [];
            textsToDraw = [];
            ctx.clearRect(0,0,width,height);
            document.getElementById('titleText').style.opacity = 0;
            document.getElementById('subText').style.opacity = 0;
        }

        // Animates a drawing line using the Tracer system
        function drawLineAnim(sx, sy, ex, ey, duration, color, isArrow = false, width = 4) {
            return new Promise(resolve => {
                const tracer = {
                    sx, sy, ex, ey, color, width, isArrow,
                    startTime: performance.now(),
                    duration,
                    done: false
                };
                activeTracers.push(tracer);
                
                const checkDone = () => {
                    if(!isPlaying) { resolve(); return; }
                    if(tracer.done) {
                        persistentPaths.push({sx, sy, ex, ey, color, isArrow, width});
                        resolve();
                    } else {
                        requestAnimationFrame(checkDone);
                    }
                };
                checkDone();
            });
        }

        async function popTextAnim(text, x, y, color, font = "bold 24px monospace", glow = 15) {
            if(!isPlaying) return;
            activeFlashes.push({ x, y, color, size: 40, life: 1.0, decay: 0.05 });
            textsToDraw.push({text, x, y, color, font, glow});
            await sleep(150); // slight delay for impact
        }

        async function drawMatrixBrackets(x, y, w, h, color) {
            const dur = 400;
            // Left bracket (drawn simultaneously for organic feel)
            drawLineAnim(x, y-h/2, x-20, y-h/2, dur/3, color).then(() => {
                drawLineAnim(x-20, y-h/2, x-20, y+h/2, dur, color).then(() => {
                    drawLineAnim(x-20, y+h/2, x, y+h/2, dur/3, color);
                });
            });
            // Right bracket
            drawLineAnim(x+w, y-h/2, x+w+20, y-h/2, dur/3, color).then(() => {
                drawLineAnim(x+w+20, y-h/2, x+w+20, y+h/2, dur, color).then(() => {
                    drawLineAnim(x+w+20, y+h/2, x+w, y+h/2, dur/3, color);
                });
            });
            await sleep(dur * 1.5);
        }

        // --- Topic Animations ---
        const animations = {
            'vector-add': async () => {
                setTitles("Vector Addition", "Tip-to-Tail Method: u + v", "#60a5fa");
                await sleep(1000);
                
                await drawLineAnim(centerX - 100, centerY + 100, centerX, centerY, 800, "#3b82f6", true);
                await popTextAnim("u", centerX - 50, centerY + 70, "#3b82f6", "italic bold 32px serif");
                await sleep(400);

                await drawLineAnim(centerX, centerY, centerX + 150, centerY + 50, 800, "#ec4899", true);
                await popTextAnim("v", centerX + 80, centerY + 10, "#ec4899", "italic bold 32px serif");
                await sleep(400);

                await drawLineAnim(centerX - 100, centerY + 100, centerX + 150, centerY + 50, 1200, "#f59e0b", true, 6);
                await popTextAnim("u + v", centerX + 25, centerY + 100, "#f59e0b", "italic bold 32px serif", 30);
            },
            
            'vector-scale': async () => {
                setTitles("Scalar Multiplication", "Stretching/Shrinking a Vector: 2v", "#a855f7");
                await sleep(1000);

                await drawLineAnim(centerX - 150, centerY + 50, centerX - 50, centerY - 20, 800, "#a855f7", true);
                await popTextAnim("v", centerX - 100, centerY - 10, "#a855f7", "italic bold 32px serif");
                await sleep(800);

                await drawLineAnim(centerX - 150, centerY + 50, centerX + 150, centerY - 160, 1500, "#fcd34d", true, 6);
                await popTextAnim("2v", centerX + 50, centerY - 110, "#fcd34d", "italic bold 38px serif", 25);
            },

            'matrix-size': async () => {
                setTitles("Matrix Dimensions", "Rows (Horizontal) × Columns (Vertical)", "#10b981");
                await sleep(800);

                drawMatrixBrackets(centerX - 60, centerY, 120, 150, "#ffffff");
                await sleep(400);
                
                const grid = [['a', 'b', 'c'], ['d', 'e', 'f']];
                for(let r=0; r<2; r++) {
                    for(let c=0; c<3; c++) {
                        popTextAnim(grid[r][c], centerX - 40 + c*40, centerY - 30 + r*60, "#9ca3af");
                        await sleep(100);
                    }
                }
                await sleep(800);

                setTitles("Matrix Dimensions", "2 Rows", "#f43f5e");
                drawLineAnim(centerX - 80, centerY - 30, centerX + 80, centerY - 30, 600, "#f43f5e", false, 12);
                drawLineAnim(centerX - 80, centerY + 30, centerX + 80, centerY + 30, 600, "#f43f5e", false, 12);
                await sleep(1500);
                persistentPaths = persistentPaths.slice(0, 6); // Clear row highlights

                setTitles("Matrix Dimensions", "2 Rows × 3 Columns", "#3b82f6");
                drawLineAnim(centerX - 40, centerY - 70, centerX - 40, centerY + 70, 600, "#3b82f6", false, 12);
                drawLineAnim(centerX, centerY - 70, centerX, centerY + 70, 600, "#3b82f6", false, 12);
                drawLineAnim(centerX + 40, centerY - 70, centerX + 40, centerY + 70, 600, "#3b82f6", false, 12);
            },

            'matrix-add': async () => {
                setTitles("Matrix Addition", "Add corresponding elements", "#06b6d4");
                await sleep(600);

                drawMatrixBrackets(centerX - 250, centerY, 80, 100, "#fff");
                popTextAnim("1", centerX - 230, centerY - 25, "#3b82f6");
                popTextAnim("2", centerX - 190, centerY - 25, "#3b82f6");
                popTextAnim("3", centerX - 230, centerY + 25, "#3b82f6");
                popTextAnim("4", centerX - 190, centerY + 25, "#3b82f6");

                popTextAnim("+", centerX - 120, centerY, "#fff", "bold 40px monospace");

                drawMatrixBrackets(centerX - 60, centerY, 80, 100, "#fff");
                popTextAnim("5", centerX - 40, centerY - 25, "#ec4899");
                popTextAnim("6", centerX, centerY - 25, "#ec4899");
                popTextAnim("7", centerX - 40, centerY + 25, "#ec4899");
                popTextAnim("8", centerX, centerY + 25, "#ec4899");

                popTextAnim("=", centerX + 70, centerY, "#fff", "bold 40px monospace");

                await sleep(600);
                drawMatrixBrackets(centerX + 130, centerY, 80, 100, "#f59e0b");
                await sleep(300);
                await popTextAnim("6", centerX + 150, centerY - 25, "#f59e0b", "bold 30px monospace", 25);
                await popTextAnim("8", centerX + 190, centerY - 25, "#f59e0b", "bold 30px monospace", 25);
                await popTextAnim("10", centerX + 150, centerY + 25, "#f59e0b", "bold 30px monospace", 25);
                await popTextAnim("12", centerX + 190, centerY + 25, "#f59e0b", "bold 30px monospace", 25);
            },

            'matrix-scale': async () => {
                setTitles("Scalar Multiplication", "Multiply every element by scalar", "#8b5cf6");
                await sleep(600);

                popTextAnim("3", centerX - 150, centerY, "#fcd34d", "bold 50px monospace", 30);
                drawMatrixBrackets(centerX - 80, centerY, 80, 100, "#fff");
                
                popTextAnim("2", centerX - 60, centerY - 25, "#fff");
                popTextAnim("-1", centerX - 20, centerY - 25, "#fff");
                popTextAnim("0", centerX - 60, centerY + 25, "#fff");
                popTextAnim("4", centerX - 20, centerY + 25, "#fff");

                popTextAnim("=", centerX + 50, centerY, "#fff", "bold 40px monospace");

                await sleep(800);
                drawLineAnim(centerX - 130, centerY, centerX - 70, centerY - 25, 400, "#fcd34d", false, 2);
                drawLineAnim(centerX - 130, centerY, centerX - 30, centerY - 25, 400, "#fcd34d", false, 2);
                
                drawMatrixBrackets(centerX + 110, centerY, 80, 100, "#8b5cf6");
                await sleep(300);
                await popTextAnim("6", centerX + 130, centerY - 25, "#8b5cf6", "bold 30px monospace", 20);
                await popTextAnim("-3", centerX + 170, centerY - 25, "#8b5cf6", "bold 30px monospace", 20);
                await popTextAnim("0", centerX + 130, centerY + 25, "#8b5cf6", "bold 30px monospace", 20);
                await popTextAnim("12", centerX + 170, centerY + 25, "#8b5cf6", "bold 30px monospace", 20);
            },

            'matrix-transpose': async () => {
                setTitles("Matrix Transpose (Aᵀ)", "Rows become columns. Main diagonal stays.", "#0ea5e9");
                await sleep(800);

                drawMatrixBrackets(centerX - 200, centerY, 120, 120, "#fff");
                popTextAnim("1", centerX - 180, centerY - 40, "#fff"); 
                popTextAnim("2", centerX - 140, centerY - 40, "#f43f5e"); 
                popTextAnim("3", centerX - 100, centerY - 40, "#f43f5e"); 

                popTextAnim("4", centerX - 180, centerY, "#3b82f6"); 
                popTextAnim("5", centerX - 140, centerY, "#fff"); 
                popTextAnim("6", centerX - 100, centerY, "#f43f5e"); 

                popTextAnim("7", centerX - 180, centerY + 40, "#3b82f6"); 
                popTextAnim("8", centerX - 140, centerY + 40, "#3b82f6"); 
                popTextAnim("9", centerX - 100, centerY + 40, "#fff"); 

                drawLineAnim(centerX-200, centerY-60, centerX-80, centerY+60, 600, "rgba(255,255,255,0.4)", false, 12);
                popTextAnim("➔", centerX - 20, centerY, "#fff", "bold 40px monospace");

                await sleep(1000);
                drawMatrixBrackets(centerX + 60, centerY, 120, 120, "#0ea5e9");
                
                popTextAnim("1", centerX + 80, centerY - 40, "#fff");
                popTextAnim("4", centerX + 120, centerY - 40, "#3b82f6"); 
                popTextAnim("7", centerX + 160, centerY - 40, "#3b82f6"); 

                popTextAnim("2", centerX + 80, centerY, "#f43f5e"); 
                popTextAnim("5", centerX + 120, centerY, "#fff");
                popTextAnim("8", centerX + 160, centerY, "#3b82f6"); 

                popTextAnim("3", centerX + 80, centerY + 40, "#f43f5e"); 
                popTextAnim("6", centerX + 120, centerY + 40, "#f43f5e"); 
                popTextAnim("9", centerX + 160, centerY + 40, "#fff");
                
                drawLineAnim(centerX - 140, centerY - 40, centerX + 80, centerY, 1000, "#f43f5e", true, 3);
                drawLineAnim(centerX - 180, centerY, centerX + 120, centerY - 40, 1000, "#3b82f6", true, 3);
            },

            'type-rect': async () => {
                setTitles("Rectangular vs Square Matrix", "Depends on number of rows (m) and columns (n)", "#eab308");
                await sleep(800);

                drawMatrixBrackets(centerX - 250, centerY, 120, 80, "#fff");
                popTextAnim("1", centerX - 230, centerY - 20, "#9ca3af");
                popTextAnim("2", centerX - 190, centerY - 20, "#9ca3af");
                popTextAnim("3", centerX - 150, centerY - 20, "#9ca3af");
                popTextAnim("4", centerX - 230, centerY + 20, "#9ca3af");
                popTextAnim("5", centerX - 190, centerY + 20, "#9ca3af");
                popTextAnim("6", centerX - 150, centerY + 20, "#9ca3af");
                popTextAnim("Rectangular (2x3)", centerX - 190, centerY + 80, "#eab308", "16px sans-serif");
                
                drawLineAnim(centerX - 250, centerY - 50, centerX - 130, centerY - 50, 200, "#eab308", false, 3).then(()=>
                drawLineAnim(centerX - 130, centerY - 50, centerX - 130, centerY + 50, 200, "#eab308", false, 3)).then(()=>
                drawLineAnim(centerX - 130, centerY + 50, centerX - 250, centerY + 50, 200, "#eab308", false, 3)).then(()=>
                drawLineAnim(centerX - 250, centerY + 50, centerX - 250, centerY - 50, 200, "#eab308", false, 3));

                await sleep(1000);

                drawMatrixBrackets(centerX + 50, centerY, 120, 120, "#fff");
                for(let r=0; r<3; r++){
                    for(let c=0; c<3; c++){
                        popTextAnim("x", centerX + 70 + c*40, centerY - 40 + r*40, "#9ca3af");
                    }
                }
                popTextAnim("Square (3x3)", centerX + 110, centerY + 100, "#eab308", "16px sans-serif");
                
                drawLineAnim(centerX + 50, centerY - 70, centerX + 170, centerY - 70, 200, "#10b981", false, 3).then(()=>
                drawLineAnim(centerX + 170, centerY - 70, centerX + 170, centerY + 70, 200, "#10b981", false, 3)).then(()=>
                drawLineAnim(centerX + 170, centerY + 70, centerX + 50, centerY + 70, 200, "#10b981", false, 3)).then(()=>
                drawLineAnim(centerX + 50, centerY + 70, centerX + 50, centerY - 70, 200, "#10b981", false, 3));
            },

            'type-diagonal': async () => {
                setTitles("Diagonal Matrix", "Non-zero elements ONLY on the main diagonal", "#a855f7");
                await sleep(600);

                drawMatrixBrackets(centerX - 60, centerY, 120, 120, "#fff");
                await sleep(200);

                const grid = [['5', '0', '0'], ['0', '-2', '0'], ['0', '0', '8']];
                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        let color = r===c ? "#a855f7" : "#4b5563"; 
                        let font = r===c ? "bold 32px monospace" : "18px monospace";
                        popTextAnim(grid[r][c], centerX - 40 + c*40, centerY - 40 + r*40, color, font);
                        await sleep(100);
                    }
                }

                await sleep(500);
                await drawLineAnim(centerX - 60, centerY - 60, centerX + 60, centerY + 60, 1000, "#d946ef", false, 12);
            },

            'type-scalar': async () => {
                setTitles("Scalar Matrix", "A Diagonal matrix where all main elements are EQUAL", "#f97316");
                await sleep(600);

                drawMatrixBrackets(centerX - 60, centerY, 120, 120, "#fff");
                await sleep(200);

                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        let val = r===c ? '4' : '0';
                        let color = r===c ? "#f97316" : "#4b5563"; 
                        let font = r===c ? "bold 32px monospace" : "18px monospace";
                        popTextAnim(val, centerX - 40 + c*40, centerY - 40 + r*40, color, font);
                        await sleep(100);
                    }
                }

                await sleep(500);
                await drawLineAnim(centerX - 60, centerY - 60, centerX + 60, centerY + 60, 1000, "#fdba74", false, 12);
            },

            'type-identity': async () => {
                setTitles("Identity Matrix (I)", "Diagonal elements are 1, others are 0", "#22d3ee");
                await sleep(600);

                drawMatrixBrackets(centerX - 60, centerY, 120, 120, "#fff");
                await sleep(200);

                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        let val = r===c ? '1' : '0';
                        let color = r===c ? "#ffffff" : "#334155"; 
                        let font = r===c ? "bold 36px monospace" : "18px monospace";
                        popTextAnim(val, centerX - 40 + c*40, centerY - 40 + r*40, color, font, r===c ? 25 : 0);
                        await sleep(100);
                    }
                }

                await sleep(500);
                await drawLineAnim(centerX - 60, centerY - 60, centerX + 60, centerY + 60, 800, "#22d3ee", false, 18);
            },

            'type-zero': async () => {
                setTitles("Zero Matrix (0)", "All elements are exactly zero.", "#64748b");
                await sleep(600);

                drawMatrixBrackets(centerX - 60, centerY, 120, 120, "#475569");
                await sleep(200);
                
                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        popTextAnim("0", centerX - 40 + c*40, centerY - 40 + r*40, "#94a3b8", "bold 24px monospace", 5);
                    }
                }
                
                await sleep(500);
                await drawLineAnim(centerX - 80, centerY, centerX + 80, centerY, 1500, "#334155", false, 30);
            },

            'type-triangular': async () => {
                setTitles("Triangular Matrix", "Upper or Lower elements are zero", "#ec4899");
                await sleep(800);

                popTextAnim("Upper", centerX - 140, centerY - 80, "#ec4899", "16px sans-serif");
                drawMatrixBrackets(centerX - 200, centerY, 120, 120, "#fff");
                const gridU = [['1', '2', '3'], ['0', '4', '5'], ['0', '0', '6']];
                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        let color = gridU[r][c] === '0' ? "#4b5563" : "#ec4899";
                        popTextAnim(gridU[r][c], centerX - 180 + c*40, centerY - 40 + r*40, color);
                    }
                }
                
                drawLineAnim(centerX-200, centerY-60, centerX-80, centerY-60, 300, "#ec4899", false, 3).then(()=>
                drawLineAnim(centerX-80, centerY-60, centerX-80, centerY+60, 300, "#ec4899", false, 3)).then(()=>
                drawLineAnim(centerX-80, centerY+60, centerX-200, centerY-60, 400, "#ec4899", false, 3));

                await sleep(1000);

                popTextAnim("Lower", centerX + 100, centerY - 80, "#3b82f6", "16px sans-serif");
                drawMatrixBrackets(centerX + 40, centerY, 120, 120, "#fff");
                const gridL = [['1', '0', '0'], ['2', '4', '0'], ['3', '5', '6']];
                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        let color = gridL[r][c] === '0' ? "#4b5563" : "#3b82f6";
                        popTextAnim(gridL[r][c], centerX + 60 + c*40, centerY - 40 + r*40, color);
                    }
                }

                drawLineAnim(centerX+40, centerY-60, centerX+40, centerY+60, 300, "#3b82f6", false, 3).then(()=>
                drawLineAnim(centerX+40, centerY+60, centerX+160, centerY+60, 300, "#3b82f6", false, 3)).then(()=>
                drawLineAnim(centerX+160, centerY+60, centerX+40, centerY-60, 400, "#3b82f6", false, 3));
            }
        };

        // --- Interaction Logic ---
        let currentTopic = 'vector-add';

        async function playTopic(topic) {
            isPlaying = false; 
            await sleep(50); 
            
            isPlaying = true;
            clearScene();
            
            if(animations[topic]) {
                await animations[topic]();
            }
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentTopic = e.currentTarget.dataset.topic;
                playTopic(currentTopic);
            });
        });

        document.getElementById('btnReplay').addEventListener('click', () => {
            playTopic(currentTopic);
        });

        playTopic(currentTopic);

    </script>
</body>
</html>
