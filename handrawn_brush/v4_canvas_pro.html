<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Refined Art & Light Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            touch-action: none; /* Prevent scrolling on mobile while drawing */
            font-family: system-ui, -apple-system, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }
        /* Grid background for better orientation in the dark */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }
        .glass-panel {
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* Custom Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        /* Custom Color Picker Styling */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            padding: 0;
            overflow: hidden;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.5);
        }

        /* Hide scrollbar for the bottom dock on small screens */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-grid relative text-white">

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Header info (Top Left) -->
    <div class="fixed top-6 left-6 pointer-events-none z-10">
        <h1 class="text-2xl font-bold tracking-tight text-white drop-shadow-md">Canvas<span class="text-gray-500 font-light">Pro</span></h1>
        <p class="text-xs text-gray-400 font-medium tracking-wide mt-1 uppercase" id="brushIndicatorText">Fire Brush</p>
    </div>

    <!-- Actions Dock (Top Right) -->
    <div class="fixed top-6 right-6 glass-panel rounded-2xl px-2 py-2 flex items-center gap-1 z-10 transition-all duration-300">
        <button id="btnUndo" class="p-2.5 text-gray-400 hover:text-white hover:bg-white/10 rounded-xl transition-all active:scale-95" title="Undo (Ctrl+Z)">
            <i data-lucide="undo-2" class="w-5 h-5"></i>
        </button>

        <button id="btnClear" class="p-2.5 text-gray-400 hover:text-red-400 hover:bg-red-500/10 rounded-xl transition-all active:scale-95" title="Clear Canvas">
            <i data-lucide="trash-2" class="w-5 h-5"></i>
        </button>

        <div class="w-px h-6 bg-gray-700 mx-1"></div>

        <button id="btnPlay" class="flex items-center gap-2 px-4 py-2 text-orange-400 hover:text-orange-300 hover:bg-orange-500/10 rounded-xl transition-all active:scale-95 font-semibold text-sm tracking-wide" title="Replay Animation">
            <div id="playIconContainer">
                <i data-lucide="play" class="w-4 h-4 fill-current"></i>
            </div>
            <span id="playText">Animate</span>
        </button>
    </div>

    <!-- Main Tools Dock (Bottom Center) -->
    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 glass-panel rounded-2xl p-2 flex items-center gap-2 shadow-2xl z-10 w-[92vw] sm:w-auto overflow-x-auto hide-scrollbar">
        
        <!-- Brush Selection -->
        <div class="flex items-center gap-1 shrink-0">
            <button data-brush="fire" class="brush-btn p-3 rounded-xl text-orange-400 bg-orange-500/20 transition-all active:scale-95" title="Fire Light">
                <i data-lucide="flame" class="w-5 h-5"></i>
            </button>
            <button data-brush="glow" class="brush-btn p-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all active:scale-95" title="Color Glow Light">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </button>
            
            <div class="w-px h-8 bg-gray-700 mx-1"></div>

            <button data-brush="sketch" class="brush-btn p-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all active:scale-95" title="Solid Sketch Pen">
                <i data-lucide="pen-line" class="w-5 h-5"></i>
            </button>
            <button data-brush="pastel" class="brush-btn p-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all active:scale-95" title="Soft Pastel Brush">
                <i data-lucide="pencil" class="w-5 h-5"></i>
            </button>
            <button data-brush="paint" class="brush-btn p-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all active:scale-95" title="Wet Paint Brush">
                <i data-lucide="paintbrush-2" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div class="w-px h-8 bg-gray-700 mx-1 shrink-0"></div>
        
        <!-- Color Picker -->
        <div class="shrink-0 flex items-center justify-center p-2 hover:bg-white/10 rounded-xl transition-colors" title="Choose Color">
            <input type="color" id="brushColor" value="#00e5ff">
        </div>

        <div class="w-px h-8 bg-gray-700 mx-1 hidden sm:block shrink-0"></div>
        
        <!-- Brush Size Slider -->
        <div class="flex items-center gap-3 shrink-0 px-3 py-2 hover:bg-white/10 rounded-xl transition-colors cursor-pointer" title="Adjust Brush Size">
            <i data-lucide="scaling" class="w-4 h-4 text-gray-400"></i>
            <input type="range" id="brushSize" min="0.3" max="3" step="0.1" value="1" class="w-20">
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- Core Variables ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // State
        let paths = []; 
        let currentPath = null;
        let isDrawing = false;
        let isAnimating = false;
        let animationFrameId = null;
        
        // Settings
        let currentBrushId = 'fire';
        let currentBrushScale = 1.0; 
        let currentBrushColor = '#00e5ff';

        // UI Elements
        const btnUndo = document.getElementById('btnUndo');
        const btnClear = document.getElementById('btnClear');
        const btnPlay = document.getElementById('btnPlay');
        const brushBtns = document.querySelectorAll('.brush-btn');
        const brushSizeInput = document.getElementById('brushSize');
        const brushColorInput = document.getElementById('brushColor');
        const brushIndicatorText = document.getElementById('brushIndicatorText');
        const playIconContainer = document.getElementById('playIconContainer');
        const playText = document.getElementById('playText');

        // --- Brush Engine Configuration ---
        // Dynamically creates stroke layers based on selected tool, scale, and color
        function getBrushConfig(id, scale, hexColor) {
            // Convert hex to RGB for rgba() usage
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            const rgb = `${r}, ${g}, ${b}`;

            switch(id) {
                case 'fire':
                    // Preset light painting style (ignores color picker)
                    return {
                        composite: 'lighter',
                        layers: [
                            { width: 30 * scale, color: 'rgba(255, 0, 0, 0.03)', blur: 25 * scale, shadow: 'rgba(255, 0, 0, 0.8)' },
                            { width: 15 * scale, color: 'rgba(255, 60, 0, 0.08)', blur: 15 * scale, shadow: 'rgba(255, 80, 0, 0.9)' },
                            { width: 6 * scale, color: 'rgba(255, 200, 0, 0.4)', blur: 8 * scale, shadow: 'rgba(255, 200, 0, 1)' },
                            { width: 2 * scale, color: 'rgba(255, 255, 255, 0.9)', blur: 2 * scale, shadow: 'rgba(255, 255, 255, 1)' }
                        ]
                    };
                case 'glow':
                    // Dynamic light painting style based on color picker
                    return {
                        composite: 'lighter',
                        layers: [
                            { width: 30 * scale, color: `rgba(${rgb}, 0.03)`, blur: 25 * scale, shadow: `rgba(${rgb}, 0.8)` },
                            { width: 15 * scale, color: `rgba(${rgb}, 0.08)`, blur: 15 * scale, shadow: `rgba(${rgb}, 0.9)` },
                            { width: 6 * scale, color: `rgba(${rgb}, 0.4)`, blur: 8 * scale, shadow: `rgba(${rgb}, 1)` },
                            { width: 2 * scale, color: 'rgba(255, 255, 255, 0.9)', blur: 2 * scale, shadow: 'rgba(255, 255, 255, 1)' }
                        ]
                    };
                case 'sketch':
                    // Simple, solid, unblurred line
                    return {
                        composite: 'source-over',
                        layers: [
                            { width: 3 * scale, color: `rgba(${rgb}, 1)`, blur: 0, shadow: 'transparent' }
                        ]
                    };
                case 'pastel':
                    // Soft, slightly transparent textured feel
                    return {
                        composite: 'source-over',
                        layers: [
                            { width: 16 * scale, color: `rgba(${rgb}, 0.25)`, blur: 6 * scale, shadow: 'transparent' },
                            { width: 8 * scale, color: `rgba(${rgb}, 0.5)`, blur: 2 * scale, shadow: 'transparent' }
                        ]
                    };
                case 'paint':
                    // Thick line with depth/shadow
                    return {
                        composite: 'source-over',
                        layers: [
                            { width: 20 * scale, color: `rgba(${rgb}, 0.9)`, blur: 2 * scale, shadow: 'rgba(0,0,0,0.4)' },
                            { width: 16 * scale, color: `rgba(${rgb}, 1)`, blur: 0, shadow: 'transparent' }
                        ]
                    };
            }
        }

        // --- Initialization & Responsive Scaling ---
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = `${window.innerWidth}px`;
            canvas.style.height = `${window.innerHeight}px`;
            ctx.scale(dpr, dpr);
            redrawAll();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Utility Functions ---
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        }

        // --- Drawing Engine ---
        function drawSegment(p1, p2, brushId, scale, color) {
            const config = getBrushConfig(brushId, scale, color);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalCompositeOperation = config.composite;

            config.layers.forEach(layer => {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineWidth = layer.width;
                ctx.strokeStyle = layer.color;
                ctx.shadowBlur = layer.blur;
                ctx.shadowColor = layer.shadow;
                ctx.stroke();
            });
        }

        function redrawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            paths.forEach(path => {
                for (let i = 1; i < path.points.length; i++) {
                    drawSegment(path.points[i - 1], path.points[i], path.brush, path.scale, path.color);
                }
            });
        }

        // --- Event Handlers (Mouse & Touch) ---
        function startDrawing(e) {
            if (isAnimating) stopAnimation();
            isDrawing = true;
            
            const pos = getPos(e);
            currentPath = {
                brush: currentBrushId,
                scale: currentBrushScale,
                color: currentBrushColor,
                points: [{ x: pos.x, y: pos.y }]
            };
            paths.push(currentPath);
            updateActionButtons();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); 

            const pos = getPos(e);
            const lastPoint = currentPath.points[currentPath.points.length - 1];

            if (getDistance(lastPoint, pos) > 3) {
                const newPoint = { x: pos.x, y: pos.y };
                currentPath.points.push(newPoint);
                drawSegment(lastPoint, newPoint, currentPath.brush, currentPath.scale, currentPath.color);
            }
        }

        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            
            // Draw a dot if just a single tap
            if (currentPath.points.length === 1) {
                const p = currentPath.points[0];
                drawSegment(p, {x: p.x + 0.1, y: p.y + 0.1}, currentPath.brush, currentPath.scale, currentPath.color);
            }
            updateActionButtons();
        }

        function getPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

        // --- UI Controls & State Management ---
        function updateActiveBrushStyle() {
            brushBtns.forEach(btn => {
                const isSelected = btn.dataset.brush === currentBrushId;
                
                // Reset styling
                btn.className = `brush-btn p-3 rounded-xl transition-all active:scale-95 ${
                    isSelected ? 'bg-white/20' : 'hover:bg-white/10 text-gray-400 hover:text-white'
                }`;

                if (isSelected) {
                    if (currentBrushId === 'fire') {
                        btn.classList.add('text-orange-400', 'bg-orange-500/20');
                        btn.classList.remove('bg-white/20');
                        brushIndicatorText.textContent = "Fire Light";
                    } else {
                        // Apply selected color to the active icon as a nice UI touch
                        btn.style.color = currentBrushColor;
                        btn.style.textShadow = `0 0 10px ${currentBrushColor}`;
                        brushIndicatorText.textContent = btn.title;
                    }
                } else {
                    btn.style.color = '';
                    btn.style.textShadow = 'none';
                }
            });
        }

        brushBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentBrushId = e.currentTarget.dataset.brush;
                updateActiveBrushStyle();
            });
        });

        brushColorInput.addEventListener('input', (e) => {
            currentBrushColor = e.target.value;
            updateActiveBrushStyle(); // Update icon color instantly
            
            // If user changes color while Fire is selected, switch them to Glow automatically
            if (currentBrushId === 'fire') {
                currentBrushId = 'glow';
                updateActiveBrushStyle();
            }
        });

        brushSizeInput.addEventListener('input', (e) => {
            currentBrushScale = parseFloat(e.target.value);
        });

        // Top Actions
        btnUndo.addEventListener('click', () => {
            if (isAnimating || paths.length === 0) return;
            paths.pop();
            redrawAll();
            updateActionButtons();
        });

        // Keyboard shortcut for Undo (Ctrl+Z)
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                e.preventDefault();
                btnUndo.click();
            }
        });

        btnClear.addEventListener('click', () => {
            if (isAnimating) stopAnimation();
            if (paths.length === 0) return;
            
            canvas.style.transition = 'opacity 0.2s';
            canvas.style.opacity = '0';
            
            setTimeout(() => {
                paths = [];
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                canvas.style.opacity = '1';
                updateActionButtons();
            }, 200);
        });

        btnPlay.addEventListener('click', () => {
            if (paths.length === 0) return;
            if (isAnimating) stopAnimation();
            else startAnimation();
        });

        function updateActionButtons() {
            btnUndo.disabled = paths.length === 0 || isAnimating;
            btnClear.disabled = paths.length === 0 && !isAnimating;
            
            if (isAnimating) {
                playIconContainer.innerHTML = '<i data-lucide="square" class="w-4 h-4 fill-current"></i>';
                playText.textContent = 'Stop';
                btnPlay.classList.add('text-red-400', 'bg-red-500/10');
                btnPlay.classList.remove('text-orange-400', 'hover:bg-orange-500/10');
            } else {
                playIconContainer.innerHTML = '<i data-lucide="play" class="w-4 h-4 fill-current"></i>';
                playText.textContent = 'Animate';
                btnPlay.classList.remove('text-red-400', 'bg-red-500/10');
                btnPlay.classList.add('text-orange-400', 'hover:bg-orange-500/10');
            }
            lucide.createIcons();
        }

        // --- Animation Engine ---
        function startAnimation() {
            isAnimating = true;
            updateActionButtons();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let pathIndex = 0;
            let pointIndex = 1;
            const pointsPerFrame = 3; // Smooth playback speed

            function animateLoop() {
                if (!isAnimating) return;

                for (let i = 0; i < pointsPerFrame; i++) {
                    if (pathIndex >= paths.length) {
                        stopAnimation();
                        return;
                    }

                    const currentAnimPath = paths[pathIndex];
                    
                    if (pointIndex < currentAnimPath.points.length) {
                        const p1 = currentAnimPath.points[pointIndex - 1];
                        const p2 = currentAnimPath.points[pointIndex];
                        drawSegment(p1, p2, currentAnimPath.brush, currentAnimPath.scale, currentAnimPath.color);
                        pointIndex++;
                    } else {
                        pathIndex++;
                        pointIndex = 1;
                    }
                }

                animationFrameId = requestAnimationFrame(animateLoop);
            }

            animateLoop();
        }

        function stopAnimation() {
            isAnimating = false;
            cancelAnimationFrame(animationFrameId);
            redrawAll(); 
            updateActionButtons();
        }

        // Initialize Styles
        updateActionButtons();
        updateActiveBrushStyle();

    </script>
</body>
</html>
