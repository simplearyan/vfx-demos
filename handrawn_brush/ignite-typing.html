<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fire Light Painting Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            touch-action: none; /* Prevent scrolling on mobile while drawing */
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }
        /* Grid background for better orientation in the dark */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }
        .glass-panel {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-grid relative text-white">

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <!-- UI Controls -->
    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 glass-panel rounded-full px-6 py-3 flex items-center gap-6 shadow-2xl z-10 transition-all duration-300 hover:border-orange-500/50">
        
        <!-- Status Indicator -->
        <div id="statusIndicator" class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-orange-500/20 text-orange-400 border border-orange-500/30 px-4 py-1 rounded-full text-xs font-semibold tracking-wider uppercase opacity-0 transition-opacity duration-300">
            Drawing Mode
        </div>

        <button id="btnUndo" class="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition-colors group" title="Undo Last Stroke">
            <i data-lucide="undo-2" class="w-5 h-5 group-hover:-translate-y-0.5 transition-transform"></i>
            <span class="text-[10px] uppercase font-bold tracking-wider">Undo</span>
        </button>

        <button id="btnClear" class="flex flex-col items-center gap-1 text-gray-400 hover:text-red-400 transition-colors group" title="Clear Canvas">
            <i data-lucide="trash-2" class="w-5 h-5 group-hover:-translate-y-0.5 transition-transform"></i>
            <span class="text-[10px] uppercase font-bold tracking-wider">Clear</span>
        </button>

        <div class="w-px h-8 bg-gray-700"></div>

        <button id="btnPlay" class="flex flex-col items-center gap-1 text-orange-400 hover:text-orange-300 transition-colors group scale-110" title="Play Animation">
            <div id="playIconContainer" class="bg-orange-500/20 p-2 rounded-full group-hover:bg-orange-500/30 transition-colors">
                <i data-lucide="play" class="w-6 h-6 fill-current"></i>
            </div>
            <span class="text-[10px] uppercase font-bold tracking-wider">Animate</span>
        </button>
    </div>

    <!-- Header info -->
    <div class="fixed top-6 left-6 pointer-events-none">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-500 via-red-500 to-yellow-500">IgniteType</h1>
        <p class="text-sm text-gray-500 font-medium">Fire Light Painting Canvas</p>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // --- Core Variables ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true }); // optimize for frequent drawing
        
        // State
        let paths = []; // Stores all drawn strokes
        let currentPath = []; // The stroke currently being drawn
        let isDrawing = false;
        let isAnimating = false;
        let animationFrameId = null;

        // UI Elements
        const btnUndo = document.getElementById('btnUndo');
        const btnClear = document.getElementById('btnClear');
        const btnPlay = document.getElementById('btnPlay');
        const statusIndicator = document.getElementById('statusIndicator');
        const playIconContainer = document.getElementById('playIconContainer');

        // Fire Brush Preset Config
        const fireLayers = [
            { width: 30, color: 'rgba(255, 0, 0, 0.03)', blur: 25, shadow: 'rgba(255, 0, 0, 0.8)' },    // Deep outer glow
            { width: 15, color: 'rgba(255, 60, 0, 0.08)', blur: 15, shadow: 'rgba(255, 80, 0, 0.9)' },   // Orange mid-glow
            { width: 6, color: 'rgba(255, 200, 0, 0.4)', blur: 8, shadow: 'rgba(255, 200, 0, 1)' },      // Yellow bright core
            { width: 2, color: 'rgba(255, 255, 255, 0.9)', blur: 2, shadow: 'rgba(255, 255, 255, 1)' }   // White hot center
        ];

        // --- Initialization ---
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            redrawAll();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Utility Functions ---
        
        // Calculate distance to avoid adding too many overlapping points (prevents blowout)
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        }

        function showStatus(text) {
            statusIndicator.textContent = text;
            statusIndicator.style.opacity = '1';
            setTimeout(() => {
                if(!isAnimating) statusIndicator.style.opacity = '0';
            }, 2000);
        }

        // --- Drawing Engine ---

        function drawSegment(p1, p2) {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalCompositeOperation = 'lighter'; // Additive blending for fire/light effect

            fireLayers.forEach(layer => {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineWidth = layer.width;
                ctx.strokeStyle = layer.color;
                ctx.shadowBlur = layer.blur;
                ctx.shadowColor = layer.shadow;
                ctx.stroke();
            });
        }

        function redrawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            paths.forEach(path => {
                for (let i = 1; i < path.length; i++) {
                    drawSegment(path[i - 1], path[i]);
                }
            });
        }

        // --- Event Handlers (Mouse & Touch) ---

        function startDrawing(e) {
            if (isAnimating) stopAnimation();
            isDrawing = true;
            
            const pos = getPos(e);
            currentPath = [{ x: pos.x, y: pos.y, time: Date.now() }];
            paths.push(currentPath);
            updateUI();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // Prevent scrolling on touch

            const pos = getPos(e);
            const lastPoint = currentPath[currentPath.length - 1];

            // Only add point if it moved enough (smoother lines, prevents extreme glow buildup)
            if (getDistance(lastPoint, pos) > 3) {
                const newPoint = { x: pos.x, y: pos.y, time: Date.now() };
                currentPath.push(newPoint);
                drawSegment(lastPoint, newPoint);
            }
        }

        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            // If path is just a dot, make it slightly visible or remove it
            if (currentPath.length === 1) {
                const p = currentPath[0];
                drawSegment(p, {x: p.x + 1, y: p.y + 1});
            }
            updateUI();
        }

        function getPos(e) {
            // Handle both Mouse and Touch events
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        // Attach Event Listeners
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

        // --- Controls ---

        btnUndo.addEventListener('click', () => {
            if (isAnimating) return;
            paths.pop();
            redrawAll();
            updateUI();
            showStatus('Undo');
        });

        btnClear.addEventListener('click', () => {
            if (isAnimating) stopAnimation();
            paths = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateUI();
            showStatus('Cleared');
        });

        btnPlay.addEventListener('click', () => {
            if (paths.length === 0) return;
            if (isAnimating) {
                stopAnimation();
            } else {
                startAnimation();
            }
        });

        function updateUI() {
            btnUndo.disabled = paths.length === 0 || isAnimating;
            btnClear.disabled = paths.length === 0 && !isAnimating;
            
            // Update Play button icon and style
            const span = btnPlay.querySelector('span');
            
            if (isAnimating) {
                playIconContainer.innerHTML = '<i data-lucide="square" class="w-6 h-6 fill-current"></i>';
                span.textContent = 'Stop';
                btnPlay.classList.add('text-red-400');
                btnPlay.classList.remove('text-orange-400');
                playIconContainer.classList.add('bg-red-500/20');
                playIconContainer.classList.remove('bg-orange-500/20');
            } else {
                playIconContainer.innerHTML = '<i data-lucide="play" class="w-6 h-6 fill-current"></i>';
                span.textContent = 'Animate';
                btnPlay.classList.remove('text-red-400');
                btnPlay.classList.add('text-orange-400');
                playIconContainer.classList.remove('bg-red-500/20');
                playIconContainer.classList.add('bg-orange-500/20');
            }
            lucide.createIcons();
        }

        // --- Animation Engine ---

        function startAnimation() {
            isAnimating = true;
            updateUI();
            showStatus('Animating...');
            statusIndicator.style.opacity = '1';
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let pathIndex = 0;
            let pointIndex = 1;

            // Define animation speed (points per frame)
            // If they draw fast, it replays fast. We'll use a constant speed for smoother playback.
            const pointsPerFrame = 2; 

            function animateLoop() {
                if (!isAnimating) return;

                // Draw multiple points per frame to speed up animation nicely
                for (let i = 0; i < pointsPerFrame; i++) {
                    if (pathIndex >= paths.length) {
                        stopAnimation();
                        showStatus('Done');
                        return;
                    }

                    const currentAnimPath = paths[pathIndex];
                    
                    if (pointIndex < currentAnimPath.length) {
                        const p1 = currentAnimPath[pointIndex - 1];
                        const p2 = currentAnimPath[pointIndex];
                        drawSegment(p1, p2);
                        pointIndex++;
                    } else {
                        // Move to next stroke
                        pathIndex++;
                        pointIndex = 1;
                    }
                }

                animationFrameId = requestAnimationFrame(animateLoop);
            }

            animateLoop();
        }

        function stopAnimation() {
            isAnimating = false;
            cancelAnimationFrame(animationFrameId);
            redrawAll(); // Instantly show full drawing
            updateUI();
            statusIndicator.style.opacity = '0';
        }

        // Initialize UI state
        updateUI();

    </script>
</body>
</html>
