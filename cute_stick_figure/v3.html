<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Stick Figure Animator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Rough.js for the sketchy, hand-drawn aesthetic -->
    <script src="https://unpkg.com/roughjs@latest/bundled/rough.js"></script>
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        svg {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: 60vh;
            overflow: visible;
        }
        
        /* Thin strokes for facial features to keep them clean for morphing */
        .stroke-thin {
            stroke: #2d3436;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .fill-main {
            fill: #2d3436;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800 tracking-tight">2D Educational Avatar</h1>
        <p class="text-gray-500">Rough.js Sketch + GSAP Toggles</p>
    </div>

    <div id="canvas-container" class="relative w-full max-w-2xl bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
        <svg viewBox="0 0 400 400" id="character">
            <!-- Ground Shadow -->
            <ellipse id="shadow" cx="200" cy="385" rx="70" ry="8" fill="#e2e8f0" />

            <g id="body-group">
                <!-- Rough.js will inject paths into these empty groups -->
                <g id="rough-leg-l"></g>
                <g id="rough-leg-r"></g>
                <g id="rough-spine"></g>

                <!-- Arms (Wrapped in groups so GSAP can animate them) -->
                <g id="arm-left"></g>
                <g id="arm-right"></g>

                <!-- Head Group -->
                <g id="head-group">
                    <g id="rough-head"></g>
                    
                    <!-- Facial features remain standard SVG for clean morphing -->
                    <g id="eyebrows">
                        <path id="brow-l" d="M 160 95 Q 175 90 185 95" class="stroke-thin" />
                        <path id="brow-r" d="M 240 95 Q 225 90 215 95" class="stroke-thin" />
                    </g>
                    <g id="eyes">
                        <circle cx="175" cy="115" r="9" class="fill-main" id="eye-l" />
                        <circle cx="225" cy="115" r="9" class="fill-main" id="eye-r" />
                    </g>
                    <path id="mouth" d="M 185 145 Q 200 160 215 145" class="stroke-thin" />
                </g>
            </g>
        </svg>
    </div>

    <!-- Control Panel -->
    <div class="mt-8 flex gap-4 flex-wrap justify-center">
        <button id="btn-wave" class="px-5 py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition-all shadow-sm">
            👋 Wave
        </button>
        <button id="btn-idea" class="px-5 py-3 bg-yellow-500 hover:bg-yellow-600 text-white font-semibold rounded-xl transition-all shadow-sm">
            💡 Idea!
        </button>
        <button id="btn-confused" class="px-5 py-3 bg-purple-500 hover:bg-purple-600 text-white font-semibold rounded-xl transition-all shadow-sm">
            🤔 Confused
        </button>
        <button id="btn-talk" class="px-5 py-3 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-xl transition-all shadow-sm">
            💬 Simulate Talking
        </button>
        <button id="btn-reset" class="px-5 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-xl transition-all shadow-sm">
            Reset All
        </button>
    </div>

    <script>
        // --- 1. Draw Character with Rough.js ---
        const svg = document.getElementById('character');
        const rc = rough.svg(svg);
        
        // Settings for the "Sketchy Marker" look
        const sketchOpts = { stroke: '#2d3436', strokeWidth: 10, roughness: 1.8, bowing: 1.5 };
        
        // Draw Body Parts
        document.getElementById('rough-spine').appendChild(rc.line(200, 170, 200, 280, sketchOpts));
        document.getElementById('rough-leg-l').appendChild(rc.line(200, 280, 140, 380, sketchOpts));
        document.getElementById('rough-leg-r').appendChild(rc.line(200, 280, 260, 380, sketchOpts));
        
        // Draw Arms inside the GSAP-controlled <g> wrappers
        document.getElementById('arm-left').appendChild(rc.curve([[200, 190], [130, 200], [120, 280]], sketchOpts));
        document.getElementById('arm-right').appendChild(rc.curve([[200, 190], [270, 200], [280, 280]], sketchOpts));
        
        // Draw Head (Diameter 120 = Radius 60)
        document.getElementById('rough-head').appendChild(rc.circle(200, 120, 120, { 
            ...sketchOpts, 
            fill: '#f8f9fa', 
            fillStyle: 'solid' 
        }));

        // --- 2. Fix Pivot Points (The "Moving Hands" Bug Fix) ---
        // svgOrigin binds the rotation strictly to the SVG coordinate grid, preventing drifting.
        gsap.set(["#arm-left", "#arm-right"], { svgOrigin: "200 190" });
        gsap.set("#head-group", { svgOrigin: "200 120" });
        gsap.set("#body-group", { svgOrigin: "200 380" });

        // --- 3. Base Animations ---
        // Idle Breathing
        gsap.to("#body-group", { scaleY: 0.98, scaleX: 1.01, duration: 1.5, yoyo: true, repeat: -1, ease: "sine.inOut" });

        // Blinking
        function blink() {
            gsap.to(["#eye-l", "#eye-r"], {
                scaleY: 0.1, transformOrigin: "center", duration: 0.1, yoyo: true, repeat: 1,
                onComplete: () => setTimeout(blink, Math.random() * 3000 + 2000)
            });
        }
        setTimeout(blink, 2000); 

        // Mouse Tracking
        document.addEventListener("mousemove", (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20; 
            const y = (e.clientY / window.innerHeight - 0.5) * 15; 
            gsap.to("#eyes", { x: x, y: y, duration: 0.3, ease: "power2.out" });
            gsap.to("#head-group", { rotation: x * 0.4, duration: 0.5, ease: "power2.out" });
        });

        // --- 4. Toggle State Management ---
        let activeAnim = null;
        let activeLoop = null; // Stores the continuous loop timeline

        const btns = {
            wave: document.getElementById('btn-wave'),
            idea: document.getElementById('btn-idea'),
            confused: document.getElementById('btn-confused')
        };

        function resetPoses() {
            if(activeLoop) activeLoop.kill();
            gsap.killTweensOf(["#arm-left", "#arm-right", "#head-group", "#mouth", "#brow-l", "#brow-r", "#body-group"]);
            
            gsap.to(["#arm-left", "#arm-right"], { rotation: 0, y: 0, duration: 0.5, ease: "power2.out" });
            gsap.to("#head-group", { rotation: 0, y: 0, duration: 0.5 });
            gsap.to("#body-group", { scaleX: 1, scaleY: 1, duration: 0.5 });
            gsap.to(["#brow-l", "#brow-r"], { y: 0, rotation: 0, duration: 0.3 });
            gsap.to("#mouth", { attr: { d: "M 185 145 Q 200 160 215 145" }, duration: 0.5 });
            
            // Restart breathing loop since we killed all body tweens
            gsap.to("#body-group", { scaleY: 0.98, scaleX: 1.01, duration: 1.5, yoyo: true, repeat: -1, ease: "sine.inOut" });

            // Clear button styles
            Object.values(btns).forEach(b => b.classList.remove('ring-4', 'ring-opacity-50', 'ring-offset-2', 'ring-gray-400'));
            activeAnim = null;
        }

        function toggleAnim(animName, startFn, btnEl, ringColor) {
            if (activeAnim === animName) {
                // If clicking the active animation, just reset (toggle off)
                resetPoses();
            } else {
                // Toggle off whatever is currently running, then start new
                resetPoses();
                activeAnim = animName;
                btnEl.classList.add('ring-4', 'ring-offset-2', 'ring-opacity-50', ringColor);
                startFn();
            }
        }

        // --- 5. Toggle Actions ---

        btns.wave.addEventListener("click", () => {
            toggleAnim('wave', () => {
                // Initial swing up
                gsap.to("#arm-right", { 
                    rotation: -130, 
                    duration: 0.3, 
                    ease: "back.out(1.5)",
                    onComplete: () => {
                        // Continuous waving loop
                        activeLoop = gsap.to("#arm-right", { rotation: -90, duration: 0.3, yoyo: true, repeat: -1, ease: "sine.inOut" });
                    }
                });
            }, btns.wave, 'ring-blue-400');
        });

        btns.idea.addEventListener("click", () => {
            toggleAnim('idea', () => {
                gsap.timeline()
                    .to("#body-group", { scaleY: 0.9, scaleX: 1.05, duration: 0.2 }, 0)
                    .to("#head-group", { y: 10, duration: 0.2 }, 0)
                    .to("#body-group", { scaleY: 1.05, scaleX: 0.95, duration: 0.3, ease: "back.out(2)" })
                    .to("#head-group", { y: -15, duration: 0.3, ease: "back.out(2)" }, "<")
                    .to(["#arm-left", "#arm-right"], { rotation: 160, y: -20, duration: 0.3, ease: "back.out(1.5)" }, "<")
                    .to(["#brow-l", "#brow-r"], { y: -15, duration: 0.2 }, "<")
                    .to("#mouth", { attr: { d: "M 185 145 Q 200 175 215 145" }, duration: 0.2 }, "<");
                    // Remains in this pose until toggled off
            }, btns.idea, 'ring-yellow-400');
        });

        btns.confused.addEventListener("click", () => {
            toggleAnim('confused', () => {
                gsap.to("#arm-left", { rotation: 140, duration: 0.4, ease: "power2.out" });
                gsap.to("#head-group", { rotation: -15, duration: 0.4 });
                gsap.to("#brow-l", { y: 5, rotation: 10, svgOrigin: "172 92", duration: 0.2 });
                gsap.to("#brow-r", { y: -5, rotation: 10, svgOrigin: "227 92", duration: 0.2 });
                gsap.to("#mouth", { attr: { d: "M 180 150 Q 200 148 215 145" }, duration: 0.2 });
                
                // Continuous head scratch loop
                activeLoop = gsap.to("#arm-left", { rotation: 120, duration: 0.15, yoyo: true, repeat: -1, delay: 0.4 });
            }, btns.confused, 'ring-purple-400');
        });

        // --- 6. Talking Overlay ---
        // Talking operates independently of the body poses!
        let isTalking = false;
        let talkInterval;
        const btnTalk = document.getElementById("btn-talk");

        btnTalk.addEventListener("click", () => {
            isTalking = !isTalking;
            if (isTalking) {
                btnTalk.classList.replace("bg-green-500", "bg-red-500");
                btnTalk.classList.replace("hover:bg-green-600", "hover:bg-red-600");
                btnTalk.innerText = "🛑 Stop Talking";
                
                talkInterval = setInterval(() => {
                    const isOpen = Math.random() > 0.4;
                    const d = isOpen ? "M 185 140 Q 200 170 215 140" : "M 185 145 Q 200 148 215 145"; 
                    gsap.to("#mouth", { attr: { d: d }, duration: 0.1 });
                    if (isOpen) gsap.to("#head-group", { y: "-=3", duration: 0.1, yoyo: true, repeat: 1 });
                }, 120);
            } else {
                btnTalk.classList.replace("bg-red-500", "bg-green-500");
                btnTalk.classList.replace("hover:bg-red-600", "hover:bg-green-600");
                btnTalk.innerText = "💬 Simulate Talking";
                clearInterval(talkInterval);
                gsap.to("#mouth", { attr: { d: "M 185 145 Q 200 160 215 145" }, duration: 0.2 });
            }
        });

        document.getElementById("btn-reset").addEventListener("click", resetPoses);

    </script>
</body>
</html>
