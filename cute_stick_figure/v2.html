<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Stick Figure Animator</title>
    <!-- Tailwind CSS for quick, beautiful UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP for smooth, bouncy animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        body {
            background-color: #f8f9fa; /* Off-white paper look */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* SVG Styling for the "Thick Stroke & Cute" aesthetic */
        svg {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: 60vh;
            overflow: visible;
        }

        .stroke-main {
            stroke: #2d3436; /* Dark ink color */
            stroke-width: 18; /* THICK stroke */
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        
        .stroke-thin {
            stroke: #2d3436;
            stroke-width: 10;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .fill-main {
            fill: #2d3436;
        }

        .head-fill {
            fill: #f8f9fa;
        }

        /* Setup transform origins for accurate rotation */
        #arm-left { transform-origin: 200px 190px; }
        #arm-right { transform-origin: 200px 190px; }
        #head-group { transform-origin: 200px 120px; }
        #body-group { transform-origin: 200px 380px; } /* Anchor at the feet for breathing */
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <!-- Title Area -->
    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800 tracking-tight">2D Educational Avatar</h1>
        <p class="text-gray-500">Thick-stroke SVG + GSAP Animation</p>
    </div>

    <!-- The Character Canvas -->
    <div id="canvas-container" class="relative w-full max-w-2xl bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
        
        <svg viewBox="0 0 400 400" id="character">
            <!-- Ground Shadow -->
            <ellipse id="shadow" cx="200" cy="385" rx="70" ry="8" fill="#e2e8f0" />

            <g id="body-group">
                <!-- Legs -->
                <line id="leg-l" x1="200" y1="280" x2="140" y2="380" class="stroke-main" />
                <line id="leg-r" x1="200" y1="280" x2="260" y2="380" class="stroke-main" />

                <!-- Spine/Body -->
                <line id="spine" x1="200" y1="170" x2="200" y2="280" class="stroke-main" />

                <!-- Arms -->
                <g id="arm-left">
                    <path d="M 200 190 Q 130 200 120 280" class="stroke-main" />
                </g>
                <g id="arm-right">
                    <path d="M 200 190 Q 270 200 280 280" class="stroke-main" />
                </g>

                <!-- Head Group (Moves together) -->
                <g id="head-group">
                    <!-- Head Circle -->
                    <circle cx="200" cy="120" r="60" class="stroke-main head-fill" />
                    
                    <!-- Eyebrows (Add immense emotion) -->
                    <g id="eyebrows">
                        <path id="brow-l" d="M 160 95 Q 175 90 185 95" class="stroke-thin" />
                        <path id="brow-r" d="M 240 95 Q 225 90 215 95" class="stroke-thin" />
                    </g>

                    <!-- Eyes Group (Moves to follow mouse) -->
                    <g id="eyes">
                        <circle cx="175" cy="115" r="9" class="fill-main" id="eye-l" />
                        <circle cx="225" cy="115" r="9" class="fill-main" id="eye-r" />
                    </g>

                    <!-- Mouth -->
                    <path id="mouth" d="M 185 145 Q 200 160 215 145" class="stroke-thin" />
                </g>
            </g>
        </svg>

    </div>

    <!-- Control Panel -->
    <div class="mt-8 flex gap-4 flex-wrap justify-center">
        <button id="btn-wave" class="px-5 py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition-colors shadow-sm">
            👋 Wave
        </button>
        <button id="btn-idea" class="px-5 py-3 bg-yellow-500 hover:bg-yellow-600 text-white font-semibold rounded-xl transition-colors shadow-sm">
            💡 Idea!
        </button>
        <button id="btn-confused" class="px-5 py-3 bg-purple-500 hover:bg-purple-600 text-white font-semibold rounded-xl transition-colors shadow-sm">
            🤔 Confused
        </button>
        <button id="btn-talk" class="px-5 py-3 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-xl transition-colors shadow-sm">
            💬 Simulate Talking
        </button>
        <button id="btn-reset" class="px-5 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-xl transition-colors shadow-sm">
            Reset
        </button>
    </div>

    <script>
        // --- 0. Idle Breathing Engine ---
        // Makes the character subtly scale up and down to simulate breathing
        gsap.to("#body-group", {
            scaleY: 0.98,
            scaleX: 1.01,
            duration: 1.5,
            yoyo: true,
            repeat: -1,
            ease: "sine.inOut"
        });

        // --- 1. The Blinking Engine ---
        function blink() {
            gsap.to(["#eye-l", "#eye-r"], {
                scaleY: 0.1,
                transformOrigin: "center",
                duration: 0.1,
                yoyo: true,
                repeat: 1,
                onComplete: () => setTimeout(blink, Math.random() * 3000 + 2000)
            });
        }
        setTimeout(blink, 2000); 

        // --- 2. Mouse Tracking (Eyes follow cursor) ---
        document.addEventListener("mousemove", (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20; 
            const y = (e.clientY / window.innerHeight - 0.5) * 15; 
            
            gsap.to("#eyes", { x: x, y: y, duration: 0.3, ease: "power2.out" });
            gsap.to("#head-group", { rotation: x * 0.4, duration: 0.5, ease: "power2.out" });
        });

        // Helper to kill all conflicting animations before starting a new one
        function killAnimations() {
            gsap.killTweensOf(["#arm-left", "#arm-right", "#head-group", "#mouth", "#brow-l", "#brow-r", "#body-group"]);
        }

        // --- 3. Animation: Waving ---
        document.getElementById("btn-wave").addEventListener("click", () => {
            gsap.killTweensOf("#arm-right");
            
            gsap.timeline()
                .to("#arm-right", { rotation: -130, duration: 0.3, ease: "back.out(1.5)" })
                .to("#arm-right", { rotation: -90, duration: 0.2, yoyo: true, repeat: 3 })
                .to("#arm-right", { rotation: 0, duration: 0.4, ease: "power2.inOut" });
        });

        // --- 4. Animation: Idea / Eureka! ---
        document.getElementById("btn-idea").addEventListener("click", () => {
            killAnimations();

            gsap.timeline()
                // Anticipation (squash down)
                .to("#body-group", { scaleY: 0.9, scaleX: 1.05, duration: 0.2 }, 0)
                .to("#head-group", { y: 10, duration: 0.2 }, 0)
                // Spring up!
                .to("#body-group", { scaleY: 1.05, scaleX: 0.95, duration: 0.3, ease: "back.out(2)" })
                .to("#head-group", { y: -15, duration: 0.3, ease: "back.out(2)" }, "<")
                // Arms shoot up, eyebrows jump, mouth opens wide
                .to(["#arm-left", "#arm-right"], { rotation: 160, y: -20, duration: 0.3, ease: "back.out(1.5)" }, "<")
                .to(["#brow-l", "#brow-r"], { y: -15, duration: 0.2 }, "<")
                .to("#mouth", { attr: { d: "M 185 145 Q 200 175 215 145" }, duration: 0.2 }, "<")
                // Settle back to normal
                .to(["#arm-left", "#arm-right"], { rotation: 0, y: 0, duration: 0.6, ease: "power2.inOut", delay: 1 })
                .to(["#brow-l", "#brow-r"], { y: 0, duration: 0.4 }, "<")
                .to("#mouth", { attr: { d: "M 185 145 Q 200 160 215 145" }, duration: 0.4 }, "<")
                .to("#body-group", { scaleY: 1, scaleX: 1, duration: 0.4 }, "<")
                .to("#head-group", { y: 0, duration: 0.4 }, "<");
        });

        // --- 5. Animation: Confused (Scratching Head) ---
        document.getElementById("btn-confused").addEventListener("click", () => {
            killAnimations();

            gsap.timeline()
                // Arm goes up, head tilts
                .to("#arm-left", { rotation: 140, duration: 0.4, ease: "power2.out" }, 0)
                .to("#head-group", { rotation: -15, duration: 0.4 }, 0)
                // Eyebrows furrow (one up, one down)
                .to("#brow-l", { y: 5, rotation: 10, transformOrigin: "center", duration: 0.2 }, 0)
                .to("#brow-r", { y: -5, rotation: 10, transformOrigin: "center", duration: 0.2 }, 0)
                // Mouth flattens and shifts
                .to("#mouth", { attr: { d: "M 180 150 Q 200 148 215 145" }, duration: 0.2 }, 0)
                // Arm scratches
                .to("#arm-left", { rotation: 120, duration: 0.15, yoyo: true, repeat: 3 })
                // Return to normal
                .to("#arm-left", { rotation: 0, duration: 0.5, ease: "power2.inOut" }, "+=0.2")
                .to("#head-group", { rotation: 0, duration: 0.5, ease: "power2.inOut" }, "<")
                .to(["#brow-l", "#brow-r"], { y: 0, rotation: 0, duration: 0.3 }, "<")
                .to("#mouth", { attr: { d: "M 185 145 Q 200 160 215 145" }, duration: 0.5 }, "<");
        });

        // --- 6. Animation: Talking Simulation ---
        let isTalking = false;
        let talkInterval;

        document.getElementById("btn-talk").addEventListener("click", (e) => {
            isTalking = !isTalking;
            const btn = e.target;

            if (isTalking) {
                btn.classList.replace("bg-green-500", "bg-red-500");
                btn.classList.replace("hover:bg-green-600", "hover:bg-red-600");
                btn.innerText = "🛑 Stop Talking";
                
                // Randomly open and close mouth
                talkInterval = setInterval(() => {
                    const isOpen = Math.random() > 0.4;
                    const d = isOpen 
                        ? "M 185 140 Q 200 170 215 140" // Wide open
                        : "M 185 145 Q 200 148 215 145"; // Almost closed
                    
                    gsap.to("#mouth", { attr: { d: d }, duration: 0.1 });
                    
                    // Add bouncy head movement
                    if (isOpen) gsap.to("#head-group", { y: -3, duration: 0.1, yoyo: true, repeat: 1 });
                }, 120);
            } else {
                btn.classList.replace("bg-red-500", "bg-green-500");
                btn.classList.replace("hover:bg-red-600", "hover:bg-green-600");
                btn.innerText = "💬 Simulate Talking";
                clearInterval(talkInterval);
                gsap.to("#mouth", { attr: { d: "M 185 145 Q 200 160 215 145" }, duration: 0.2 });
            }
        });

        // --- 7. Reset Button ---
        document.getElementById("btn-reset").addEventListener("click", () => {
            killAnimations();
            gsap.to(["#arm-left", "#arm-right"], { rotation: 0, y: 0, duration: 0.5, ease: "power2.out" });
            gsap.to("#head-group", { rotation: 0, y: 0, duration: 0.5 });
            gsap.to("#body-group", { scaleX: 1, scaleY: 1, duration: 0.5 });
            gsap.to(["#brow-l", "#brow-r"], { y: 0, rotation: 0, duration: 0.3 });
            gsap.to("#mouth", { attr: { d: "M 185 145 Q 200 160 215 145" }, duration: 0.5 });
            
            // Restart breathing loop
            gsap.to("#body-group", { scaleY: 0.98, scaleX: 1.01, duration: 1.5, yoyo: true, repeat: -1, ease: "sine.inOut" });
        });

    </script>
</body>
</html>
